<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="admin-shell">

  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="openDrawer()">☰</button>
      <div class="brand">
        <img src="assets/logo.png">
        <span>Ristorante</span>
      </div>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <aside class="drawer" id="drawer">
    <div>
      <div class="drawer-head">
        <div class="drawer-title">
          <h2>Officine Mare</h2>
          <p>Pannello di gestione</p>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>

      <nav class="drawer-nav">
        <a class="drawer-link" href="admin.html">📅 Prenotazioni</a>
        <a class="drawer-link" href="tables.html">◻️ Tavoli</a>
        <a class="drawer-link active" href="menu.html">📖 Menu</a>
        <a class="drawer-link" href="orders.html">🍽️ Ordini</a>
        <a class="drawer-link" href="kitchen.html">👨‍🍳 Cucina</a>
      </nav>
    </div>

    <div>
      <button class="btn btn-soft" style="width:100%;" onclick="doLogout()">Esci</button>
    </div>
  </aside>

  <main class="admin-content">

    <section class="page-header">
      <h1>Menu</h1>
      <p>Gestisci i piatti del ristorante</p>
    </section>

    <section class="card" style="padding:24px;margin-bottom:22px;">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:14px;">
        <input id="itemName" placeholder="Nome piatto">
        <select id="itemCategory">
          <option value="">Categoria</option>
          <option value="Antipasti">Antipasti</option>
          <option value="Primi">Primi</option>
          <option value="Secondi">Secondi</option>
          <option value="Contorni">Contorni</option>
          <option value="Bevande">Bevande</option>
          <option value="Dolci">Dolci</option>
        </select>
        <input id="itemPrice" type="number" step="0.01" placeholder="Prezzo">
      </div>

      <div style="display:grid;grid-template-columns:1fr auto;gap:14px;">
        <input id="itemDescription" placeholder="Descrizione piatto">
        <button class="btn btn-primary" onclick="saveItem()">＋ Salva piatto</button>
      </div>
    </section>

    <section id="menuList" class="reservation-list"></section>

  </main>
</div>

<script type="module">
import { requireAuth, logout } from "./js/auth.service.js";
import { getMenuItems, createMenuItem, toggleMenuItem } from "./js/menu.service.js";

await requireAuth();

function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
}

async function loadMenu(){
  const items = await getMenuItems();
  const box = document.getElementById("menuList");

  if(!items.length){
    box.innerHTML = `<div class="empty-card">Nessun piatto presente</div>`;
    return;
  }

  box.innerHTML = items.map(item => `
    <article class="reservation-card">
      <div class="reservation-top">
        <div>
          <h3 class="reservation-name">${item.name}</h3>
          <div class="reservation-meta">
            <span>📖 ${item.category || "-"}</span>
            <span>💶 €${Number(item.price || 0).toFixed(2)}</span>
            ${item.description ? `<span>📝 ${item.description}</span>` : ""}
          </div>
        </div>

        <div class="reservation-actions" style="margin-top:0;">
          <button class="btn ${item.active ? 'btn-danger' : 'btn-success'}" onclick="toggleItem('${item.id}', ${!item.active})">
            ${item.active ? "Disattiva" : "Attiva"}
          </button>
        </div>
      </div>
    </article>
  `).join("");
}

async function saveItem(){
  const name = document.getElementById("itemName").value.trim();
  const category = document.getElementById("itemCategory").value;
  const price = document.getElementById("itemPrice").value;
  const description = document.getElementById("itemDescription").value.trim();

  if(!name){
    alert("Inserisci il nome del piatto");
    return;
  }

  await createMenuItem({
    name,
    category,
    price: Number(price || 0),
    description,
    active: true
  });

  document.getElementById("itemName").value = "";
  document.getElementById("itemCategory").value = "";
  document.getElementById("itemPrice").value = "";
  document.getElementById("itemDescription").value = "";

  loadMenu();
}

async function toggleItem(id, active){
  await toggleMenuItem(id, active);
  loadMenu();
}

async function doLogout(){
  await logout();
  location.href = "login.html";
}

window.openDrawer = openDrawer;
window.closeDrawer = closeDrawer;
window.saveItem = saveItem;
window.toggleItem = toggleItem;
window.doLogout = doLogout;

loadMenu();
</script>

</body>
</html>
