<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Menu - Officine Mare</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" id="openDrawerBtn">☰</button>
      <div class="brand"><img src="assets/logo.png" alt="Logo"><span>Ristorante</span></div>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div>
      <div class="drawer-head">
        <div class="drawer-title"><h2>Officine Mare</h2><p>Pannello di gestione</p></div>
        <button class="drawer-close" id="closeDrawerBtn">✕</button>
      </div>
      <nav class="drawer-nav">
        <a class="drawer-link" href="admin.html">📅 Prenotazioni</a>
        <a class="drawer-link" href="tables.html">◻️ Tavoli</a>
        <a class="drawer-link active" href="menu.html">📖 Menu</a>
        <a class="drawer-link" href="orders.html">🍽️ Ordini</a>
        <a class="drawer-link" href="kitchen.html">👨‍🍳 Cucina</a>
        <a class="drawer-link" href="calendar.html">🗓️ Gestisci calendario</a>
      </nav>
    </div>
    <div><button class="btn btn-soft" style="width:100%;" id="logoutBtn">Esci</button></div>
  </aside>

  <main class="admin-content">
    <section class="page-header">
      <h1>Menu</h1>
      <p>Gestisci i piatti e il menù del giorno</p>
    </section>

    <section class="card" style="padding:24px;margin-bottom:22px;">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:14px;">
        <input id="itemName" placeholder="Nome piatto">
        <select id="itemCategory">
          <option value="">Categoria</option>
          <option value="Antipasti">Antipasti</option>
          <option value="Primi">Primi</option>
          <option value="Secondi">Secondi</option>
          <option value="Contorni">Contorni</option>
          <option value="Bevande">Bevande</option>
          <option value="Dolci">Dolci</option>
        </select>
        <input id="itemPrice" type="number" step="0.01" placeholder="Prezzo">
      </div>

      <div style="display:grid;grid-template-columns:1fr auto;gap:14px;">
        <input id="itemDescription" placeholder="Descrizione piatto">
        <button class="btn btn-primary" id="saveItemBtn">＋ Salva piatto</button>
      </div>
    </section>

    <section class="card" style="padding:24px;margin-bottom:22px;">
      <h3 style="margin-top:0;">Menù del giorno</h3>
      <p style="color:var(--muted);">Carica una nuova immagine. Se ne carichi una nuova, sostituisce la precedente.</p>

      <div style="display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;">
        <input id="menuDayFile" type="file" accept="image/*">
        <button class="btn btn-primary" id="uploadDayMenuBtn">Carica menù del giorno</button>
      </div>

      <div id="menuDayStatus" style="margin-top:12px;color:var(--muted);"></div>
      <div id="menuDayPreview" style="margin-top:16px;"></div>
    </section>

    <section id="menuList" class="reservation-list"></section>
  </main>
</div>

<script type="module" src="js/menu-page.js"></script>
</body>
</html>
