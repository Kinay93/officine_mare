<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Eventi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #0b3d91;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #082c66;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Nuovo Evento</h2>

  <div class="form-group">
    <label>Titolo</label>
    <input type="text" id="eventTitle" placeholder="Titolo evento">
  </div>

  <div class="form-group">
    <label>Descrizione</label>
    <textarea id="eventDescription" placeholder="Descrizione evento"></textarea>
  </div>

  <div class="form-group">
    <label>Data</label>
    <input type="date" id="eventDate">
  </div>

  <div class="form-group">
    <label>Immagine evento</label>
    <input type="file" id="eventImage" accept="image/*">
  </div>

  <button id="saveEventBtn">Salva evento</button>
</div>

<script type="module" src="js/event.js"></script>

</body>
</html>
