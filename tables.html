<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Tavoli - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div style="display:flex;min-height:100vh;">

  <aside style="width:260px;background:#0B1F3A;color:white;padding:24px;">
    <div style="text-align:center;margin-bottom:24px;">
      <img src="assets/logo.jpg" height="80" onerror="this.src='assets/logo.png'">
      <h2 style="margin-top:12px;">Officine Mare</h2>
      <div style="opacity:0.7;">Pannello di gestione</div>
    </div>

    <a class="sidebar-link" href="admin.html">Prenotazioni</a>
    <a class="sidebar-link" href="menu.html">Menu</a>
    <a class="sidebar-link active" href="tables.html">Tavoli</a>
    <a class="sidebar-link" href="orders.html">Ordini</a>
    <a class="sidebar-link" href="kitchen.html">Cucina</a>
  </aside>

  <main style="flex:1;padding:30px;">
    <div class="page-title">
      <div>
        <h1>Tavoli</h1>
        <p style="color:#6B7280;margin-top:8px;">Gestione disponibilità tavoli</p>
      </div>
    </div>

    <div id="tablesList" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;"></div>
  </main>

</div>

<script type="module">
import { getTables, updateTableStatus } from "./js/ui.js";

async function loadTables() {
  const tables = await getTables();

  let html = "";

  tables.forEach(t => {
    html += `
      <div class="list-card">
        <h3 style="margin-top:0;">${t.code}</h3>
        <div style="color:#6B7280;margin-bottom:10px;">${t.seats || 0} coperti</div>
        <div style="margin-bottom:16px;">
          Stato: <b>${t.is_open ? "Aperto" : "Chiuso"}</b>
        </div>
        <button onclick="toggleTable('${t.code}', ${!t.is_open})">
          ${t.is_open ? "Chiudi" : "Apri"}
        </button>
      </div>
    `;
  });

  document.getElementById("tablesList").innerHTML = html;
}

async function toggleTable(code, is_open) {
  await updateTableStatus(code, is_open);
  loadTables();
}

window.toggleTable = toggleTable;

loadTables();
</script>

</body>
</html>
