<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Officine Mare — Cucina</title>
  <link rel="icon" href="favicon.ico" />
  <style>
    :root{
      --bgTop:#245b7c; --bgMid:#1b4968; --bgBot:#163e5a;
      --paper: rgba(255,255,255,.94);
      --text:#0b2236; --muted: rgba(11,34,54,.62);
      --borderD: rgba(11,34,54,.10);
      --shadow: 0 26px 80px rgba(0,0,0,.22);
      --shadowSoft: 0 10px 26px rgba(0,0,0,.10);
      --radiusXL: 26px;
      --safeTop: env(safe-area-inset-top, 0px);
      --headerH: 70px;
      --max: 1500px;
    }
    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      overflow-x:hidden;
      background:
        radial-gradient(1200px 520px at 50% -170px, rgba(255,255,255,.16), transparent 60%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 42%, var(--bgBot) 100%);
    }
    #bgImg{
      position: fixed; inset:0;
      width:100vw; height:100dvh;
      object-fit: cover;
      z-index:0;
      opacity:.70;
      filter: saturate(1.06) contrast(1.04);
      pointer-events:none;
    }
    #overlay{
      position: fixed; inset:0; z-index:1; pointer-events:none;
      background: linear-gradient(to bottom, rgba(22,62,90,.18), rgba(22,62,90,.80));
    }
    .container{
      width: min(96vw, var(--max));
      margin: 0 auto;
      padding: 0 clamp(12px, 1.8vw, 28px);
      position: relative;
      z-index: 2;
    }
    header{
      position: sticky; top:0; z-index: 50;
      padding-top: var(--safeTop);
      background: rgba(22,62,90,.76);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .header-inner{
      height: var(--headerH);
      display:flex; align-items:center; gap: 12px;
      padding: 10px 0;
      flex-wrap: wrap;
    }
    .brand{
      font-weight: 950;
      letter-spacing: .5px;
      font-size: 20px;
      white-space: nowrap;
      display:flex; align-items:center; gap:10px;
      opacity:.98;
    }
    .ghost{
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
      font-weight: 950;
      cursor: pointer;
      text-decoration: none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      box-shadow: 0 10px 20px rgba(0,0,0,.10);
    }
    .actions{ margin-left:auto; display:flex; gap:10px; flex-wrap: wrap; align-items:center; }
    main{ padding: 18px 0 64px; }

    .card{
      background: var(--paper);
      color: var(--text);
      border-radius: var(--radiusXL);
      border: 1px solid var(--borderD);
      box-shadow: var(--shadow);
      padding: 18px;
      overflow:hidden;
    }
    .title{ font-weight: 950; font-size: 18px; margin:0 0 6px; }
    .muted{ color: var(--muted); font-size: 13px; margin:0; line-height: 1.35; }

    .row{ display:flex; gap:10px; flex-wrap: wrap; align-items:center; }
    select{
      width: 220px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(11,34,54,.16);
      background: rgba(255,255,255,.98);
      color: var(--text);
      outline:none;
    }

    .list{ display:grid; gap: 12px; margin-top: 14px; }

    .orderCard{
      border-radius: 22px;
      border: 1px solid rgba(11,34,54,.09);
      background: rgba(255,255,255,.98);
      padding: 12px;
      box-shadow: var(--shadowSoft);
      display:grid;
      gap: 10px;
    }

    .pill{
      display:inline-flex; align-items:center; gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      font-weight: 950; font-size: 12px;
      border: 1px solid rgba(11,34,54,.10);
      background: rgba(36,91,124,.08);
      color: rgba(11,34,54,.92);
      white-space: nowrap;
    }
    .pill.todo{ background: rgba(255,180,90,.18); }
    .pill.ready{ background: rgba(40,140,80,.16); }
    .pill.served{ background: rgba(36,91,124,.10); }

    button{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(11,34,54,.14);
      cursor:pointer;
      font-weight: 950;
    }
    .primary{
      color:#fff;
      border-color: rgba(0,0,0,.10);
      background: linear-gradient(180deg, rgba(36,91,124,.96), rgba(22,62,90,.98));
      box-shadow: 0 14px 28px rgba(0,0,0,.14);
    }
    .soft{ background: rgba(36,91,124,.10); color: rgba(11,34,54,.92); }
    .mini{ padding: 8px 10px; font-size: 12px; }

    @media (max-width: 560px){
      select{ width: 100%; }
      .actions{ margin-left:0; width:100%; }
    }
  </style>
</head>
<body>
  <img id="bgImg" src="mare.png" alt="" aria-hidden="true">
  <div id="overlay" aria-hidden="true"></div>

  <header>
    <div class="container header-inner">
      <div class="brand">🔎 Officine Mare — Cucina</div>
      <div class="actions">
        <button class="ghost" id="soundBtn">🔔 Suono: ON</button>
        <button class="ghost" id="vibeBtn">📳 Vibra: ON</button>
        <button class="ghost" id="refreshBtn">Aggiorna</button>
        <a class="ghost" href="admin.html">↩ Admin</a>
      </div>
      <div class="row" style="width:100%; margin-top:6px;">
        <select id="filterSel">
          <option value="open">Aperte</option>
          <option value="archived">Chiuse</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h2 class="title">Comande</h2>
      <p class="muted">Puoi mettere “Pronto” riga per riga. Anche se alcune righe sono “Servito”, le altre restano gestibili.</p>
      <div id="ordersList" class="list"></div>
      <p class="muted" id="msg" style="margin-top:12px;"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="backend.js"></script>

  <script>
    // Guard
    async function guard(){
      try{
        const s = await OM.getSession();
        if(!s) location.href = "login.html";
      }catch{ location.href = "login.html"; }
    }

    // Notifiche (best effort)
    let soundOn = true, vibeOn = true;
    const soundBtn = document.getElementById("soundBtn");
    const vibeBtn = document.getElementById("vibeBtn");
    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔔 Suono: ON" : "🔕 Suono: OFF";
    });
    vibeBtn.addEventListener("click", () => {
      vibeOn = !vibeOn;
      vibeBtn.textContent = vibeOn ? "📳 Vibra: ON" : "📴 Vibra: OFF";
    });

    function ping(){
      if(vibeOn && navigator.vibrate) navigator.vibrate([120,60,120]);
      if(soundOn){
        try{
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = "sine"; o.frequency.value = 880;
          g.gain.value = 0.08;
          o.start();
          setTimeout(() => { o.stop(); ctx.close(); }, 120);
        }catch{}
      }
    }

    const ordersList = document.getElementById("ordersList");
    const msg = document.getElementById("msg");
    const filterSel = document.getElementById("filterSel");

    const fmtTime = (iso) => {
      try { return new Date(iso).toLocaleTimeString("it-IT", {hour:"2-digit", minute:"2-digit"}); }
      catch { return ""; }
    };
    const minutesSince = (iso) => {
      try { return Math.max(0, Math.floor((Date.now() - new Date(iso).getTime())/60000)); }
      catch { return null; }
    };

    async function loadOrders({silent=false} = {}){
      msg.textContent = "";
      try{
        const all = await OM.getActiveOrdersWithItems(); // backend ritorna solo open
        let orders = all;

        // se vuoi vedere chiuse, per ora le lasciamo non mostrate (open only) come tuo flusso.
        // (se vuoi anche le archived, serve una funzione backend dedicata; te la aggiungo quando vuoi)

        if(filterSel.value === "archived"){
          orders = []; // placeholder
        }

        renderOrders(orders);

        if(!silent){
          // ping se ci sono nuove comande "recenti" (best-effort)
          // semplice: se esiste un order creato negli ultimi 20s
          const now = Date.now();
          const recent = orders.some(o => (now - new Date(o.created_at).getTime()) < 20000);
          if(recent) ping();
        }
      }catch(e){
        msg.textContent = "Errore: " + (e?.message || e);
      }
    }

    function renderOrders(orders){
      ordersList.innerHTML = "";
      if(!orders.length){
        ordersList.innerHTML = `<div class="muted">(nessuna comanda)</div>`;
        return;
      }

      orders.forEach(o => {
        const items = (o.order_items || []);
        const total = items.length;
        const readyCount = items.filter(x => x.line_status === "ready").length;

        const box = document.createElement("div");
        box.className = "orderCard";
        box.innerHTML = `
          <div class="row" style="justify-content:space-between;">
            <div>
              <div class="title" style="margin:0; font-size:22px;">Tavolo ${o.table_code}</div>
              <div class="muted">Ricevuta alle ${fmtTime(o.created_at)} · ID ${o.id}</div>
            </div>
            <span class="pill ${readyCount===total && total>0 ? "ready":"todo"}">
              ${readyCount===total && total>0 ? "TUTTO PRONTO" : "In lavorazione ("+readyCount+"/"+total+")"}
            </span>
          </div>
          <div class="list" data-items></div>
          <div class="row" style="justify-content:flex-end;">
            <button class="soft mini" data-act="archive">Chiudi (solo se tutto pronto)</button>
          </div>
        `;

        const wrap = box.querySelector("[data-items]");

        items.forEach(it => {
          const servedMins = it.served_at ? minutesSince(it.served_at) : null;

          const row = document.createElement("div");
          row.className = "orderCard";
          row.style.padding = "12px";
          row.style.boxShadow = "none";
          row.style.borderRadius = "18px";
          row.innerHTML = `
            <div class="row" style="justify-content:space-between; align-items:center;">
              <div>
                <div style="font-weight:950; font-size:18px;">${it.item_name}</div>
                <div class="muted">qty: ${it.qty}</div>
              </div>
              <div class="row" style="justify-content:flex-end;">
                <span class="pill ${it.line_status==="ready" ? "ready":"todo"}">${it.line_status==="ready" ? "Pronto" : "Da fare"}</span>
                ${
                  it.served
                    ? `<span class="pill served">Servito · ${servedMins ?? 0} min</span>`
                    : `<span class="pill served">Non servito</span>`
                }
                <button class="${it.line_status==="ready" ? "soft":"primary"} mini" data-act="toggleReady" data-id="${it.id}">
                  ${it.line_status==="ready" ? "Metti da fare" : "Metti pronto"}
                </button>
              </div>
            </div>
          `;

          // ✅ FIX: questo bottone è SEMPRE attivo per la riga (non dipende dal fatto che altre righe siano servite)
          row.querySelector("[data-act='toggleReady']").addEventListener("click", async () => {
            try{
              const btn = row.querySelector("[data-act='toggleReady']");
              btn.disabled = true;
              const makeReady = (it.line_status !== "ready");
              await OM.setLineReady(it.id, makeReady);
              await loadOrders({silent:true});
            }catch(e){
              alert("Errore: " + (e?.message || e));
            }
          });

          wrap.appendChild(row);
        });

        box.querySelector("[data-act='archive']").addEventListener("click", async () => {
          try{
            await OM.archiveOrderIfComplete(o.id);
            await loadOrders({silent:true});
          }catch(e){
            alert(e?.message === "ORDER_NOT_COMPLETE"
              ? "Non puoi chiudere: non è tutto pronto."
              : ("Errore: " + (e?.message || e))
            );
          }
        });

        ordersList.appendChild(box);
      });
    }

    document.getElementById("refreshBtn").addEventListener("click", () => loadOrders());
    filterSel.addEventListener("change", () => loadOrders({silent:true}));

    // Realtime ping
    let unsub = null;
    async function startRealtime(){
      try{
        if(unsub) unsub();
        unsub = OM.subscribeRealtime((ev) => {
          // se arrivano nuove righe/ordini, refresh leggero + ping
          if(ev.table === "orders" || ev.table === "order_items"){
            clearTimeout(window.__rtk);
            window.__rtk = setTimeout(() => loadOrders(), 250);
          }
        });
      }catch{}
    }

    (async function init(){
      await guard();
      await loadOrders({silent:true});
      await startRealtime();
    })();
  </script>
</body>
</html>
