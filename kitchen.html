<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cucina - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/kitchen.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="admin-shell">

  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="openDrawer()">☰</button>
      <div class="brand">
        <img src="assets/logo.png">
        <span>Cucina</span>
      </div>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <aside class="drawer" id="drawer">
    <div>
      <div class="drawer-head">
        <div class="drawer-title">
          <h2>Officine Mare</h2>
          <p>Pannello di gestione</p>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>

      <nav class="drawer-nav">
        <a class="drawer-link" href="admin.html">📅 Prenotazioni</a>
        <a class="drawer-link" href="tables.html">◻️ Tavoli</a>
        <a class="drawer-link" href="menu.html">📖 Menu</a>
        <a class="drawer-link" href="orders.html">🍽️ Ordini</a>
        <a class="drawer-link active" href="kitchen.html">👨‍🍳 Cucina</a>
      </nav>
    </div>

    <div>
      <button class="btn btn-soft" style="width:100%;" onclick="doLogout()">Esci</button>
    </div>
  </aside>

  <main class="admin-content">
    <section class="page-header">
      <h1>Cucina</h1>
      <p>Marce in arrivo</p>
    </section>

    <section id="ordersBox" class="reservation-list"></section>
  </main>
</div>

<script type="module">
import { requireAuth, logout } from "./js/auth.service.js";
import supabase from "./js/supabase-client.js";
import { getKitchenOrders, printKitchenOrder } from "./js/kitchen-advanced.service.js";
import { clearFiredLine } from "./js/orders-advanced.service.js";

await requireAuth();

const pendingPrints = new Map();

function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
}

function playBell(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 950;
    gain.gain.value = 0.08;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    setTimeout(() => osc.stop(), 180);
  }catch(e){}
}

function schedulePrint(order){
  if(pendingPrints.has(order.id)) return;

  playBell();

  const timeoutId = setTimeout(() => {
    printKitchenOrder(order);
    pendingPrints.delete(order.id);

    const badge = document.getElementById(`print-status-${order.id}`);
    if(badge){
      badge.textContent = "Stampato";
      badge.className = "badge badge-confirmed";
    }

    const cancelBtn = document.getElementById(`cancel-print-${order.id}`);
    if(cancelBtn){
      cancelBtn.remove();
    }
  }, 4000);

  pendingPrints.set(order.id, timeoutId);
}

function cancelScheduledPrint(orderId){
  const timeoutId = pendingPrints.get(orderId);
  if(timeoutId){
    clearTimeout(timeoutId);
    pendingPrints.delete(orderId);
  }

  const badge = document.getElementById(`print-status-${orderId}`);
  if(badge){
    badge.textContent = "Stampa annullata";
    badge.className = "badge badge-cancelled";
  }

  const btn = document.getElementById(`cancel-print-${orderId}`);
  if(btn){
    btn.remove();
  }
}

async function loadKitchen(){
  const orders = await getKitchenOrders();
  const firedLines = [];

  orders.forEach(order => {
    (order.order_items || []).forEach(item => {
      if(item.fired){
        firedLines.push({
          orderId: order.id,
          table_code: order.table_code,
          item
        });
      }
    });
  });

  const box = document.getElementById("ordersBox");

  if(!firedLines.length){
    box.innerHTML = `<div class="empty-card">Nessuna marcia in cucina</div>`;
    return;
  }

  box.innerHTML = firedLines.map(line => `
    <article class="reservation-card">
      <div class="reservation-top">
        <div>
          <h3 class="reservation-name">Tavolo ${line.table_code}</h3>
          <div class="reservation-meta">
            <span>🍽️ ${line.item.item_name}</span>
            <span>🔢 x${line.item.qty}</span>
          </div>
        </div>
      </div>

      <div class="reservation-actions">
        <span id="print-status-${line.orderId}" class="badge badge-pending">Stampa tra pochi secondi</span>
        <button id="cancel-print-${line.orderId}" class="btn btn-danger" onclick="cancelScheduledPrint('${line.orderId}')">Annulla stampa</button>
      </div>
    </article>
  `).join("");

  const groupedOrders = {};
  firedLines.forEach(line => {
    if(!groupedOrders[line.orderId]){
      groupedOrders[line.orderId] = {
        id: line.orderId,
        table_code: line.table_code,
        created_at: new Date().toISOString(),
        order_items: []
      };
    }
    groupedOrders[line.orderId].order_items.push(line.item);
  });

  Object.values(groupedOrders).forEach(order => schedulePrint(order));

  firedLines.forEach(line => {
    setTimeout(async () => {
      await clearFiredLine(line.item.id);
      loadKitchen();
    }, 10000);
  });
}

async function doLogout(){
  await logout();
  location.href = "login.html";
}

window.openDrawer = openDrawer;
window.closeDrawer = closeDrawer;
window.cancelScheduledPrint = cancelScheduledPrint;
window.doLogout = doLogout;

await loadKitchen();

supabase
  .channel("kitchen-live")
  .on("postgres_changes", { event:"*", schema:"public", table:"order_items" }, async () => {
    loadKitchen();
  })
  .subscribe();
</script>

</body>
</html>
