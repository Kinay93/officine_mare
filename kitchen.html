<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Officine Mare — Cucina</title>

  <style>
    :root{
      --paper: rgba(255,255,255,.95);
      --text:#0b2236; --muted: rgba(11,34,54,.68);
      --borderD: rgba(11,34,54,.10);
      --shadow: 0 22px 70px rgba(0,0,0,.20);
      --radiusXL: 26px;
      --max: 1600px;
      --safeTop: env(safe-area-inset-top, 0px);
    }
    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      overflow-x:hidden;
      background:#0f3c56;
    }

    #bgImg{
      position:fixed; inset:0;
      width:100vw; height:100vh;
      object-fit:cover;
      opacity:.70;
      filter:saturate(1.05) contrast(1.04);
      z-index:0;
      pointer-events:none;
    }
    #overlay{
      position:fixed; inset:0; z-index:1; pointer-events:none;
      background: linear-gradient(180deg, rgba(10,40,60,.35), rgba(10,40,60,.78));
    }

    .container{
      width:min(96vw, var(--max));
      margin:0 auto;
      padding: 0 clamp(12px, 1.8vw, 28px);
      position:relative;
      z-index:2;
    }

    header{
      position:sticky; top:0; z-index:50;
      padding-top: var(--safeTop);
      background: rgba(15,60,86,.78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .header-inner{
      display:flex; align-items:center; gap:12px;
      padding: 10px 0;
      flex-wrap: wrap;
    }
    .brand{ font-weight:950; font-size: 18px; white-space:nowrap; }
    .actions{ margin-left:auto; display:flex; gap:10px; flex-wrap:wrap; }
    .ghost{
      padding:10px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.92);
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex; align-items:center; gap:8px;
    }

    main{ padding: 18px 0 50px; }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      background: var(--paper);
      color: var(--text);
      border-radius: var(--radiusXL);
      border: 1px solid var(--borderD);
      box-shadow: var(--shadow);
      padding: 16px;
      overflow:hidden;
    }
    .title{ font-weight:950; font-size: 18px; margin:0; }
    .muted{ color: var(--muted); font-size: 13px; }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

    select{
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(11,34,54,.18);
      background: rgba(255,255,255,.98);
      color: var(--text);
      outline:none;
    }
    button{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(11,34,54,.16);
      cursor:pointer;
      font-weight: 950;
    }
    .primary{
      color:#fff;
      border-color: rgba(0,0,0,.10);
      background: linear-gradient(180deg, rgba(36,91,124,.96), rgba(22,62,90,.98));
      box-shadow: 0 16px 28px rgba(0,0,0,.12);
    }
    .soft{
      background: rgba(36,91,124,.10);
      color: rgba(11,34,54,.92);
    }
    .mini{ padding: 8px 10px; border-radius:999px; font-size:12px; }

    .list{ margin-top: 10px; display:grid; gap: 8px; }
    .item{
      border-radius: 16px;
      border: 1px solid rgba(11,34,54,.10);
      background: rgba(255,255,255,.98);
      padding: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .itName{ font-weight: 950; font-size: 13px; }
    .badge{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.08);
      color: rgba(11,34,54,.92);
      white-space: nowrap;
    }
    .badge.open{ background: rgba(255,180,90,.18); }
    .badge.done{ background: rgba(40,140,80,.16); }
    .badge.served{ background: rgba(70,110,180,.16); }

    .lineState{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.06);
      color: rgba(11,34,54,.90);
    }
    .lineState.ready{
      background: rgba(40,140,80,.16);
      border-color: rgba(40,140,80,.25);
    }
    .lineState.served{
      background: rgba(70,110,180,.16);
      border-color: rgba(70,110,180,.20);
    }
  </style>
</head>

<body>
  <img id="bgImg" src="mare.png" alt="" aria-hidden="true">
  <div id="overlay" aria-hidden="true"></div>

  <header>
    <div class="container header-inner">
      <div class="brand">🍳 Officine Mare — Cucina</div>
      <div class="actions">
        <button class="ghost" id="soundBtn">🔔 Suono: ON</button>
        <button class="ghost" id="vibBtn">📳 Vibra: ON</button>
        <button class="ghost" id="refreshBtn">Aggiorna</button>
        <a class="ghost" href="admin.html">↩️ Admin</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="row" style="margin-bottom:12px;">
      <select id="filter">
        <option value="open">Aperte</option>
        <option value="done">Complete</option>
        <option value="all">Tutte</option>
      </select>
      <span class="muted" id="statusMsg"></span>
    </div>

    <div class="grid" id="ordersGrid"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="backend.js"></script>

  <script>
    const ordersGrid = document.getElementById("ordersGrid");
    const filterEl = document.getElementById("filter");
    const statusMsg = document.getElementById("statusMsg");

    const soundBtn = document.getElementById("soundBtn");
    const vibBtn = document.getElementById("vibBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    let soundOn = true;
    let vibOn = true;

    function fmtTime(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" });
      }catch{ return ""; }
    }
    function minutesAgo(iso){
      if(!iso) return null;
      const t = new Date(iso).getTime();
      if(!t) return null;
      return Math.max(0, Math.floor((Date.now() - t)/60000));
    }

    function beep(){
      if(!soundOn) return;
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.value = 740;
        g.gain.value = 0.06;
        o.connect(g); g.connect(ctx.destination);
        o.start();
        setTimeout(() => { o.stop(); ctx.close(); }, 160);
      }catch{}
    }
    function vibrate(){
      if(!vibOn) return;
      try{ navigator.vibrate?.([120, 80, 120]); }catch{}
    }

    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔔 Suono: ON" : "🔕 Suono: OFF";
      if(soundOn) beep();
    });
    vibBtn.addEventListener("click", () => {
      vibOn = !vibOn;
      vibBtn.textContent = vibOn ? "📳 Vibra: ON" : "📴 Vibra: OFF";
      if(vibOn) vibrate();
    });

    function orderProgress(order){
      const items = order.order_items || [];
      const total = items.length;
      const ready = items.filter(it => it.line_status === "ready").length;
      const done = total > 0 && ready === total;
      return { total, ready, done };
    }

    async function render(){
      const all = await OM.getActiveOrdersWithItems();
      const f = filterEl.value;

      let rows = all;

      if(f !== "all"){
        rows = rows.filter(o => {
          const p = orderProgress(o);
          return f === "done" ? p.done : !p.done;
        });
      }

      ordersGrid.innerHTML = "";
      if(rows.length === 0){
        ordersGrid.innerHTML = `
          <div class="card">
            <h2 class="title">Nessuna comanda</h2>
            <p class="muted">Qui compariranno le comande inviate dall’admin.</p>
          </div>`;
        return;
      }

      rows.forEach(o => {
        const p = orderProgress(o);
        const headerBadge = p.done
          ? `<span class="badge done">Completa (${p.ready}/${p.total})</span>`
          : `<span class="badge open">In lavorazione (${p.ready}/${p.total})</span>`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="row" style="justify-content:space-between; align-items:flex-start;">
            <div>
              <h2 class="title">Tavolo ${o.table_code}</h2>
              <div class="muted">Ricevuta alle ${fmtTime(o.created_at)} · ID ${o.id}</div>
            </div>
            <div class="row">
              ${headerBadge}
              ${p.done ? `<button class="soft mini" data-act="archive" data-oid="${o.id}">Archivia</button>` : ``}
            </div>
          </div>

          <div class="list">
            ${(o.order_items || []).map(it => {
              const ready = it.line_status === "ready";
              const served = !!it.served;
              const mins = served ? minutesAgo(it.served_at) : null;

              return `
                <div class="item">
                  <div>
                    <div class="itName">${it.item_name}</div>
                    <div class="muted small">qty: <strong>${it.qty}</strong></div>
                  </div>
                  <div class="row" style="justify-content:flex-end;">
                    ${served
                      ? `<span class="lineState served">Servito ${mins!=null ? `· ${mins} min` : ""}</span>`
                      : `<span class="lineState ${ready ? "ready" : ""}">${ready ? "Pronto" : "Da fare"}</span>`
                    }
                    ${served
                      ? ``
                      : (ready
                        ? `<button class="soft mini" data-act="undo" data-lid="${it.id}">Non pronto</button>`
                        : `<button class="primary mini" data-act="ready" data-lid="${it.id}">Pronto</button>`)
                    }
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;

        card.querySelectorAll("button[data-act]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const act = btn.dataset.act;

            try{
              if(act === "archive"){
                await OM.archiveOrderIfComplete(btn.dataset.oid);
                await render();
                return;
              }
              if(act === "ready"){
                await OM.setLineReady(btn.dataset.lid, true);
                await render();
                return;
              }
              if(act === "undo"){
                await OM.setLineReady(btn.dataset.lid, false);
                await render();
                return;
              }
            }catch(e){
              alert(e.message || e);
            }
          });
        });

        ordersGrid.appendChild(card);
      });
    }

    // realtime: notifica nuova comanda
    let lastIds = "";
    async function poll(){
      const all = await OM.getActiveOrdersWithItems();
      const ids = all.map(o => o.id).sort().join("|");
      if(lastIds && ids !== lastIds){
        beep(); vibrate();
        statusMsg.textContent = "Nuova comanda arrivata ✅";
        setTimeout(() => statusMsg.textContent = "", 1500);
      }
      lastIds = ids;
      await render();
    }

    refreshBtn.addEventListener("click", poll);
    filterEl.addEventListener("change", render);

    // auth: se non loggato, rimanda admin (tu usi la stessa utenza staff)
    (async () => {
      const s = await OM.getSession();
      if(!s){ location.href = "admin.html"; return; }
      OM.subscribeRealtime((ev) => {
        if(ev.table === "orders" || ev.table === "order_items") poll();
      });
      poll();
      setInterval(poll, 2500);
    })();
  </script>
</body>
</html>
