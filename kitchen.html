<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Officine Mare — Cucina</title>
  <meta name="description" content="Cucina: gestione comande." />
  <link rel="icon" href="favicon.ico" />

  <style>
    :root{
      --bgTop:#2f6f91; --bgMid:#285f83; --bgBot:#1e5172;
      --paper: rgba(255,255,255,.95);
      --text:#0b2236; --muted: rgba(11,34,54,.68);
      --borderD: rgba(11,34,54,.10);
      --shadow: 0 22px 70px rgba(0,0,0,.20);
      --max: 1600px; --radiusXL: 26px;
      --headerH: 72px;
      --safeTop: env(safe-area-inset-top, 0px);
    }
    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      background:
        radial-gradient(1100px 480px at 50% -180px, rgba(255,255,255,.16), transparent 62%),
        radial-gradient(900px 420px at 15% 10%, rgba(255,255,255,.10), transparent 60%),
        radial-gradient(900px 420px at 85% 14%, rgba(255,255,255,.08), transparent 62%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 45%, var(--bgBot) 100%);
      overflow-x:hidden;
    }

    /* ✅ NO righe: tolto noise overlay */

    .container{
      width: min(96vw, var(--max));
      margin: 0 auto;
      padding: 0 clamp(12px, 1.8vw, 28px);
      position: relative;
      z-index: 1;
    }

    header{
      position: sticky; top:0; z-index: 50;
      padding-top: var(--safeTop);
      background: rgba(20, 70, 95, .72);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .header-inner{
      min-height: var(--headerH);
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 10px 0;
      flex-wrap: wrap;
    }
    .brand{
      font-weight: 950;
      letter-spacing: .8px;
      font-size: 22px;
      white-space: nowrap;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .actions{
      margin-left:auto;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
    }
    .ghost{
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      white-space: nowrap;
    }

    main{ padding: 18px 0 60px; }

    .row{ display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
    select{
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(11,34,54,.18);
      background: rgba(255,255,255,.98);
      color: var(--text);
      outline:none;
    }
    button{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(11,34,54,.16);
      cursor:pointer;
      font-weight: 950;
      white-space: nowrap;
    }
    .primary{
      color:#fff;
      border-color: rgba(0,0,0,.10);
      background: linear-gradient(180deg, rgba(36,91,124,.96), rgba(22,62,90,.98));
      box-shadow: 0 16px 28px rgba(0,0,0,.12);
    }
    .soft{
      background: rgba(36,91,124,.10);
      color: rgba(11,34,54,.92);
    }
    .mini{
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--paper);
      color: var(--text);
      border-radius: var(--radiusXL);
      border: 1px solid var(--borderD);
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
      overflow:hidden;
    }
    .topline{
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap: wrap;
    }
    .title{ font-weight: 950; font-size: 18px; margin:0; }
    .muted{ color: var(--muted); font-size: 13px; }
    .badge{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.08);
      color: rgba(11,34,54,.92);
      white-space: nowrap;
    }
    .badge.open{ background: rgba(255,180,90,.18); }
    .badge.done{ background: rgba(40,140,80,.16); }

    .list{ margin-top: 10px; display:grid; gap: 8px; }
    .item{
      border-radius: 16px;
      border: 1px solid rgba(11,34,54,.10);
      background: rgba(255,255,255,.98);
      padding: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .itLeft{ min-width: 0; }
    .itName{ font-weight: 950; font-size: 13px; }
    .small{ font-size: 12px; }

    .lineState{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.06);
      color: rgba(11,34,54,.90);
    }
    .lineState.ready{
      background: rgba(40,140,80,.16);
      border-color: rgba(40,140,80,.25);
    }
    .qtyPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.06);
      min-width: 44px;
    }

    /* ===== LOGIN OVERLAY ===== */
    #authOverlay{
      position:fixed; inset:0; z-index:2000;
      display:none; align-items:center; justify-content:center;
      background: rgba(0,0,0,.35); backdrop-filter: blur(8px);
    }
    #authBox{
      width:min(560px, 92vw);
      background: rgba(255,255,255,.95);
      border-radius: 22px;
      padding: 18px;
      border: 1px solid rgba(11,34,54,.12);
      box-shadow: 0 22px 70px rgba(0,0,0,.30);
      color: #0b2236;
    }

    @media (max-width: 720px){
      .card{ border-radius: 22px; padding: 14px; }
    }
  </style>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "INCOLLA_PROJECT_URL";
    const SUPABASE_ANON_KEY = "INCOLLA_ANON_KEY";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
</head>

<body>
  <!-- LOGIN -->
  <div id="authOverlay">
    <div id="authBox">
      <h2 style="margin:0 0 6px;">Accesso Cucina</h2>
      <p style="margin:0 0 12px; opacity:.75;">Accedi con l’utenza cucina (email fittizia ok).</p>
      <div class="row">
        <input id="authEmail" type="email" placeholder="cucina@officinemare.local">
        <input id="authPass" type="password" placeholder="Password">
        <button class="primary" id="authBtn">Entra</button>
      </div>
      <div id="authMsg" style="margin-top:10px; font-weight:900;"></div>
    </div>
  </div>

  <header>
    <div class="container header-inner">
      <div class="brand">🍳 Officine Mare — Cucina</div>
      <div class="actions">
        <button class="ghost" id="soundBtn">🔔 Suono: ON</button>
        <button class="ghost" id="vibBtn">📳 Vibra: ON</button>
        <button class="ghost" id="refreshBtn">Aggiorna</button>
        <a class="ghost" href="admin.html">↩️ Admin</a>
        <button class="ghost" id="logoutBtn">Esci</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="row" style="margin-bottom:12px;">
      <select id="filter">
        <option value="open">Aperte</option>
        <option value="done">Complete</option>
        <option value="all">Tutte</option>
      </select>
      <span class="muted" id="statusMsg"></span>
    </div>

    <div class="grid" id="ordersGrid"></div>
  </main>

  <script>
    // ===== AUTH kitchen role =====
    const authOverlay = document.getElementById("authOverlay");
    const authEmail = document.getElementById("authEmail");
    const authPass = document.getElementById("authPass");
    const authBtn = document.getElementById("authBtn");
    const authMsg = document.getElementById("authMsg");

    function showAuth(msg=""){ authMsg.textContent = msg; authOverlay.style.display="flex"; }
    function hideAuth(){ authOverlay.style.display="none"; }

    async function requireKitchen(){
      const { data: sess } = await supabase.auth.getSession();
      if(!sess.session){ showAuth(""); return null; }

      const { data: r, error } = await supabase
        .from("staff_users")
        .select("role")
        .eq("user_id", sess.session.user.id)
        .single();

      if(error || !r){
        await supabase.auth.signOut();
        showAuth("Utente non abilitato.");
        return null;
      }
      if(r.role !== "kitchen"){
        await supabase.auth.signOut();
        showAuth("Ruolo errato. Serve: KITCHEN");
        return null;
      }
      hideAuth();
      return sess.session;
    }

    authBtn.addEventListener("click", async ()=>{
      try{
        authMsg.textContent = "Accesso...";
        const { error } = await supabase.auth.signInWithPassword({
          email: authEmail.value.trim(),
          password: authPass.value
        });
        if(error) throw error;
        await requireKitchen();
        authMsg.textContent = "";
        await refreshKitchen();
      }catch(e){
        authMsg.textContent = "Login fallito: " + (e?.message || "errore");
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async ()=>{
      await supabase.auth.signOut();
      showAuth("Sei uscito.");
    });

    // ===== UI =====
    const ordersGrid = document.getElementById("ordersGrid");
    const filterEl = document.getElementById("filter");
    const statusMsg = document.getElementById("statusMsg");

    const soundBtn = document.getElementById("soundBtn");
    const vibBtn = document.getElementById("vibBtn");
    let soundOn = true;
    let vibOn = true;

    function fmtTime(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" });
      }catch{ return ""; }
    }

    function beep(){
      if(!soundOn) return;
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.value = 740;
        g.gain.value = 0.06;
        o.connect(g); g.connect(ctx.destination);
        o.start();
        setTimeout(() => { o.stop(); ctx.close(); }, 160);
      }catch{}
    }
    function vibrate(){
      if(!vibOn) return;
      try{ navigator.vibrate?.([120, 80, 120]); }catch{}
    }

    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔔 Suono: ON" : "🔕 Suono: OFF";
      if(soundOn) beep();
    });
    vibBtn.addEventListener("click", () => {
      vibOn = !vibOn;
      vibBtn.textContent = vibOn ? "📳 Vibra: ON" : "📴 Vibra: OFF";
      if(vibOn) vibrate();
    });

    document.getElementById("refreshBtn").addEventListener("click", ()=>refreshKitchen());
    filterEl.addEventListener("change", ()=>renderKitchen(window.__kitchenCache || []));

    async function fetchOrdersWithItems(){
      // orders + order_items
      const { data: orders, error: e1 } = await supabase
        .from("orders")
        .select("id, table_code, status, created_at")
        .order("created_at", { ascending:false });

      if(e1) throw e1;

      const { data: items, error: e2 } = await supabase
        .from("order_items")
        .select("id, order_id, name, qty, price, line_status, created_at")
        .order("created_at", { ascending:true });

      if(e2) throw e2;

      const map = new Map();
      (orders||[]).forEach(o => map.set(o.id, { ...o, items: [] }));
      (items||[]).forEach(it => {
        const o = map.get(it.order_id);
        if(o) o.items.push(it);
      });

      return Array.from(map.values());
    }

    function orderProgress(o){
      const total = (o.items||[]).length;
      const ready = (o.items||[]).filter(it=>it.line_status==="ready").length;
      const done = (total>0 && ready===total);
      return { total, ready, done };
    }

    function renderKitchen(allOrders){
      window.__kitchenCache = allOrders;

      const f = filterEl.value;
      let rows = (allOrders||[]).filter(o => o.status !== "archived");

      if(f !== "all"){
        rows = rows.filter(o => {
          const p = orderProgress(o);
          return f === "done" ? p.done : !p.done;
        });
      }

      ordersGrid.innerHTML = "";
      if(rows.length === 0){
        ordersGrid.innerHTML = `
          <div class="card">
            <h2 class="title">Nessuna comanda</h2>
            <p class="muted">Qui compariranno le comande inviate dall’admin.</p>
          </div>`;
        return;
      }

      rows.forEach(o=>{
        const p = orderProgress(o);
        const headerBadge = p.done
          ? `<span class="badge done">Completa (${p.ready}/${p.total})</span>`
          : `<span class="badge open">In lavorazione (${p.ready}/${p.total})</span>`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="topline">
            <div>
              <h2 class="title">Tavolo ${o.table_code || "—"}</h2>
              <div class="muted">Ricevuta alle ${fmtTime(o.created_at)} · ID ${o.id}</div>
            </div>
            <div class="row">
              ${headerBadge}
              ${p.done ? `<button class="soft mini" data-act="archive" data-oid="${o.id}">Archivia</button>` : ``}
            </div>
          </div>

          <div class="list">
            ${(o.items||[]).map(it=>{
              const ready = it.line_status === "ready";
              return `
                <div class="item">
                  <div class="itLeft">
                    <div class="itName">${it.name}</div>
                    <div class="muted small">qty: <strong>${it.qty}</strong></div>
                  </div>
                  <div class="row" style="justify-content:flex-end;">
                    <span class="qtyPill">x${it.qty}</span>
                    <span class="lineState ${ready ? "ready" : ""}">${ready ? "Pronto" : "Da fare"}</span>
                    ${ready
                      ? `<button class="soft mini" data-act="undoLine" data-lid="${it.id}">Non pronto</button>`
                      : `<button class="primary mini" data-act="readyLine" data-lid="${it.id}">Pronto</button>`
                    }
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;

        card.querySelectorAll("button[data-act]").forEach(btn=>{
          btn.addEventListener("click", async ()=>{
            const act = btn.dataset.act;

            if(act === "archive"){
              const pp = orderProgress(o);
              if(!pp.done) return alert("Puoi archiviare solo quando tutte le righe sono pronte.");
              const { error } = await supabase.from("orders").update({ status:"archived" }).eq("id", o.id);
              if(error) return alert(error.message);
              await refreshKitchen();
              return;
            }

            const lid = btn.dataset.lid;
            if(act === "readyLine"){
              const { error } = await supabase.from("order_items").update({ line_status:"ready" }).eq("id", lid);
              if(error) return alert(error.message);
              await refreshKitchen();
              return;
            }
            if(act === "undoLine"){
              const { error } = await supabase.from("order_items").update({ line_status:"todo" }).eq("id", lid);
              if(error) return alert(error.message);
              await refreshKitchen();
              return;
            }
          });
        });

        ordersGrid.appendChild(card);
      });
    }

    async function refreshKitchen(){
      statusMsg.textContent = "Carico...";
      try{
        const all = await fetchOrdersWithItems();
        renderKitchen(all);
        statusMsg.textContent = "";
      }catch(e){
        statusMsg.textContent = "Errore: " + (e?.message || "riprova");
      }
    }

    // ===== Realtime: se arrivano nuove righe/ordini, notifica =====
    let lastSeen = "";
    function newHash(all){
      return (all||[]).map(o=>o.id).sort().join("|");
    }

    (async ()=>{
      const s = await requireKitchen();
      if(!s) return;

      await refreshKitchen();

      supabase
        .channel("rt-kitchen")
        .on("postgres_changes", { event:"INSERT", schema:"public", table:"orders" }, async ()=>{
          beep(); vibrate();
          await refreshKitchen();
        })
        .on("postgres_changes", { event:"INSERT", schema:"public", table:"order_items" }, async ()=>{
          beep(); vibrate();
          await refreshKitchen();
        })
        .on("postgres_changes", { event:"UPDATE", schema:"public", table:"order_items" }, async ()=>{
          await refreshKitchen();
        })
        .subscribe();
    })();
  </script>
</body>
</html>
