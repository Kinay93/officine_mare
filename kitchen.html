<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Officine Mare — Cucina</title>
  <meta name="description" content="Cucina: gestione comande." />
  <link rel="icon" href="favicon.ico" />

  <style>
    :root{
      --bgTop:#245b7c;
      --bgMid:#1b4968;
      --bgBot:#163e5a;

      --paper: rgba(255,255,255,.95);
      --text:#0b2236; --muted: rgba(11,34,54,.68);
      --borderD: rgba(11,34,54,.10);
      --shadow: 0 22px 70px rgba(0,0,0,.20);
      --max: 1600px; --radiusXL: 26px;
      --headerH: 72px;
      --safeTop: env(safe-area-inset-top, 0px);

      --chipBg: rgba(255,255,255,.10);
      --chipBd: rgba(255,255,255,.16);
    }
    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      background:
        radial-gradient(1200px 520px at 50% -170px, rgba(255,255,255,.14), transparent 62%),
        radial-gradient(900px 420px at 15% 10%, rgba(255,255,255,.10), transparent 60%),
        radial-gradient(900px 420px at 85% 14%, rgba(255,255,255,.08), transparent 62%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 45%, var(--bgBot) 100%);
      overflow-x:hidden;
    }

    #bgImg{
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      opacity: .55;
      filter: saturate(1.05) contrast(1.03) blur(.5px);
    }
    #overlay{
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(1200px 520px at 50% -170px, rgba(255,255,255,.10), transparent 60%),
        linear-gradient(to bottom, rgba(22,62,90,.18), rgba(22,62,90,.72));
    }

    .container{
      width: min(96vw, var(--max));
      margin: 0 auto;
      padding: 0 clamp(12px, 1.8vw, 28px);
      position: relative;
      z-index: 2;
    }

    header{
      position: sticky; top:0; z-index: 50;
      padding-top: var(--safeTop);
      background: rgba(20, 70, 95, .78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .header-inner{
      min-height: var(--headerH);
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 10px 0;
      flex-wrap: wrap;
    }
    .brand{
      font-weight: 950;
      letter-spacing: .8px;
      font-size: clamp(18px, 2.2vw, 24px);
      white-space: nowrap;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .actions{
      margin-left:auto;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items:center;
      justify-content:flex-end;
    }
    .ghost{
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--chipBg);
      border: 1px solid var(--chipBd);
      color: rgba(255,255,255,.92);
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      white-space: nowrap;
    }

    main{ padding: 18px 0 60px; }

    .row{ display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
    select{
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(11,34,54,.18);
      background: rgba(255,255,255,.98);
      color: var(--text);
      outline:none;
    }
    button{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(11,34,54,.16);
      cursor:pointer;
      font-weight: 950;
      white-space: nowrap;
    }
    .primary{
      color:#fff;
      border-color: rgba(0,0,0,.10);
      background: linear-gradient(180deg, rgba(36,91,124,.96), rgba(22,62,90,.98));
      box-shadow: 0 16px 28px rgba(0,0,0,.12);
    }
    .soft{ background: rgba(36,91,124,.10); color: rgba(11,34,54,.92); }
    .danger{ background: rgba(180,30,40,.10); color: rgba(140,20,30,.95); border-color: rgba(140,20,30,.18); }
    .mini{ padding: 8px 10px; border-radius: 999px; font-size: 12px; }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .actions{ margin-left: 0; width:100%; justify-content:flex-start; }
    }

    .card{
      background: var(--paper);
      color: var(--text);
      border-radius: var(--radiusXL);
      border: 1px solid var(--borderD);
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
      overflow:hidden;
    }
    .topline{
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap: wrap;
    }
    .title{ font-weight: 950; font-size: 18px; margin:0; }
    .muted{ color: var(--muted); font-size: 13px; }

    .badge{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.08);
      color: rgba(11,34,54,.92);
      white-space: nowrap;
    }
    .badge.open{ background: rgba(255,180,90,.18); }
    .badge.done{ background: rgba(40,140,80,.16); }

    .list{ margin-top: 10px; display:grid; gap: 8px; }
    .item{
      border-radius: 16px;
      border: 1px solid rgba(11,34,54,.10);
      background: rgba(255,255,255,.98);
      padding: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .itLeft{ min-width: 220px; }
    .itName{ font-weight: 950; font-size: 13px; }
    .small{ font-size: 12px; }

    .lineState{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.06);
      color: rgba(11,34,54,.90);
      white-space: nowrap;
    }
    .lineState.ready{
      background: rgba(40,140,80,.16);
      border-color: rgba(40,140,80,.25);
    }
    .qtyPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.06);
      min-width: 44px;
    }

    .login-overlay{
      position: fixed; inset:0; z-index: 9999;
      display:flex; align-items:center; justify-content:center;
      background: rgba(10,20,30,.55);
      backdrop-filter: blur(10px);
      padding: 20px;
    }
    .login-card{
      width: min(560px, 96vw);
      background: rgba(255,255,255,.96);
      color: var(--text);
      border-radius: 26px;
      border: 1px solid rgba(11,34,54,.10);
      box-shadow: 0 22px 70px rgba(0,0,0,.28);
      padding: 18px;
    }
    .hidden{ display:none !important; }
  </style>
</head>

<body>
  <img id="bgImg" src="mare.png" alt="" aria-hidden="true">
  <div id="overlay" aria-hidden="true"></div>

  <header>
    <div class="container header-inner">
      <div class="brand">🍳 Officine Mare — Cucina</div>
      <div class="actions">
        <button class="ghost" id="soundBtn">🔔 Suono: ON</button>
        <button class="ghost" id="vibBtn">📳 Vibra: ON</button>
        <button class="ghost" id="refreshBtn">Aggiorna</button>
        <a class="ghost" href="admin.html">↩️ Admin</a>
        <button class="ghost" id="logoutBtn">🚪 Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="row" style="margin-bottom:12px;">
      <select id="filter">
        <option value="open">Aperte</option>
        <option value="done">Complete</option>
        <option value="all">Tutte</option>
      </select>
      <span class="muted" id="statusMsg"></span>
    </div>

    <div class="grid" id="ordersGrid"></div>
  </main>

  <!-- LOGIN -->
  <div id="loginOverlay" class="login-overlay hidden" aria-modal="true" role="dialog">
    <div class="login-card">
      <h2>Accesso cucina</h2>
      <p class="muted">Email e password (Supabase Auth).</p>
      <div class="row">
        <input id="loginEmail" type="email" placeholder="email" />
        <input id="loginPass" type="password" placeholder="password" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button class="primary" id="loginBtn">Entra</button>
        <span class="muted" id="loginMsg"></span>
      </div>
    </div>
  </div>

  <!-- Supabase + config + backend -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="backend.js"></script>

  <script>
    const ordersGrid = document.getElementById("ordersGrid");
    const filterEl = document.getElementById("filter");
    const statusMsg = document.getElementById("statusMsg");

    const soundBtn = document.getElementById("soundBtn");
    const vibBtn = document.getElementById("vibBtn");
    let soundOn = true;
    let vibOn = true;

    // beep leggero (WebAudio)
    function beep(){
      if(!soundOn) return;
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.value = 740;
        g.gain.value = 0.06;
        o.connect(g); g.connect(ctx.destination);
        o.start();
        setTimeout(() => { o.stop(); ctx.close(); }, 160);
      }catch{}
    }
    function vibrate(){
      if(!vibOn) return;
      try{ navigator.vibrate?.([120, 80, 120]); }catch{}
    }

    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔔 Suono: ON" : "🔕 Suono: OFF";
      if(soundOn) beep();
    });
    vibBtn.addEventListener("click", () => {
      vibOn = !vibOn;
      vibBtn.textContent = vibOn ? "📳 Vibra: ON" : "📴 Vibra: OFF";
      if(vibOn) vibrate();
    });

    function fmtTime(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" });
      }catch{ return ""; }
    }

    function orderProgress(o){
      const items = o.order_items || [];
      const total = items.length;
      const ready = items.filter(it => it.line_status === "ready").length;
      const done = (total > 0 && ready === total);
      return { total, ready, done };
    }

    async function render(){
      const f = filterEl.value;
      let rows = await OM.getActiveOrdersWithItems();

      if(f !== "all"){
        rows = rows.filter(o => {
          const p = orderProgress(o);
          return f === "done" ? p.done : !p.done;
        });
      }

      ordersGrid.innerHTML = "";
      if(rows.length === 0){
        ordersGrid.innerHTML = `
          <div class="card">
            <h2 class="title">Nessuna comanda</h2>
            <p class="muted">Qui compariranno le comande inviate dall’admin.</p>
          </div>`;
        return;
      }

      rows.forEach(o => {
        const p = orderProgress(o);
        const headerBadge = p.done
          ? `<span class="badge done">Completa (${p.ready}/${p.total})</span>`
          : `<span class="badge open">In lavorazione (${p.ready}/${p.total})</span>`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="topline">
            <div>
              <h2 class="title">Tavolo ${o.table_code}</h2>
              <div class="muted">Ricevuta alle ${fmtTime(o.created_at)} · ID ${o.id}</div>
            </div>
            <div class="row" style="justify-content:flex-end;">
              ${headerBadge}
              ${p.done ? `<button class="soft mini" data-act="archive" data-oid="${o.id}">Chiudi comanda</button>` : ``}
            </div>
          </div>

          <div class="list">
            ${(o.order_items || []).map(it => {
              const ready = it.line_status === "ready";
              return `
                <div class="item">
                  <div class="itLeft">
                    <div class="itName">${it.item_name}</div>
                    <div class="muted small">qty: <strong>${it.qty}</strong></div>
                  </div>

                  <div class="row" style="justify-content:flex-end;">
                    <span class="qtyPill">x${it.qty}</span>
                    <span class="lineState ${ready ? "ready" : ""}">${ready ? "Pronto" : "Da fare"}</span>
                    ${ready
                      ? `<button class="soft mini" data-act="undoLine" data-lid="${it.id}">Non pronto</button>`
                      : `<button class="primary mini" data-act="readyLine" data-lid="${it.id}">Pronto</button>`
                    }
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;

        card.querySelectorAll("button[data-act]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const act = btn.dataset.act;

            try{
              if(act === "archive"){
                await OM.archiveOrderIfComplete(btn.dataset.oid);
                await render();
                return;
              }
              if(act === "readyLine"){
                await OM.setLineReady(btn.dataset.lid, true);
                await render();
                return;
              }
              if(act === "undoLine"){
                await OM.setLineReady(btn.dataset.lid, false);
                await render();
                return;
              }
            }catch(err){
              console.error(err);
              alert(err?.message || String(err));
            }
          });
        });

        ordersGrid.appendChild(card);
      });
    }

    // ---- auth gate ----
    const loginOverlay = document.getElementById("loginOverlay");
    const loginMsg = document.getElementById("loginMsg");
    document.getElementById("loginBtn").addEventListener("click", async () => {
      loginMsg.textContent = "Accesso...";
      try{
        await OM.signIn(document.getElementById("loginEmail").value.trim(), document.getElementById("loginPass").value);
        const role = await OM.getMyRole();
        if(!role){
          loginMsg.textContent = "Utente non registrato come staff (staff_users).";
          return;
        }
        loginOverlay.classList.add("hidden");
        boot();
      }catch(err){
        console.error(err);
        loginMsg.textContent = err?.message || String(err);
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try{ await OM.signOut(); }catch{}
      location.reload();
    });

    document.getElementById("refreshBtn").addEventListener("click", render);
    filterEl.addEventListener("change", render);

    let unsub = null;
    function setupRealtime(){
      if(unsub) unsub();
      unsub = OM.subscribeRealtime((ev) => {
        if(ev.table === "orders" || ev.table === "order_items"){
          statusMsg.textContent = "Aggiornato ✅";
          setTimeout(()=>statusMsg.textContent="", 1200);
          render().catch(()=>{});
          beep(); vibrate();
        }
      });
    }

    async function boot(){
      await render();
      setupRealtime();
      setInterval(() => render().catch(()=>{}), 3500);
    }

    (async () => {
      const sess = await OM.getSession();
      if(!sess){
        loginOverlay.classList.remove("hidden");
        return;
      }
      const role = await OM.getMyRole();
      if(!role){
        loginOverlay.classList.remove("hidden");
        loginMsg.textContent = "Utente non registrato come staff (staff_users).";
        return;
      }
      loginOverlay.classList.add("hidden");
      boot();
    })();
  </script>
</body>
</html>
