<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cucina - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/kitchen.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="admin-shell">

  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="openDrawer()">☰</button>
      <div class="brand">
        <img src="assets/logo.png">
        <span>Cucina</span>
      </div>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <aside class="drawer" id="drawer">
    <div>
      <div class="drawer-head">
        <div class="drawer-title">
          <h2>Officine Mare</h2>
          <p>Pannello di gestione</p>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>

      <nav class="drawer-nav">
        <a class="drawer-link" href="admin.html">📅 Prenotazioni</a>
        <a class="drawer-link" href="tables.html">◻️ Tavoli</a>
        <a class="drawer-link" href="menu.html">📖 Menu</a>
        <a class="drawer-link" href="orders.html">🍽️ Ordini</a>
        <a class="drawer-link active" href="kitchen.html">👨‍🍳 Cucina</a>
      </nav>
    </div>

    <div>
      <button class="btn btn-soft" style="width:100%;" onclick="doLogout()">Esci</button>
    </div>
  </aside>

  <main class="admin-content">
    <section class="page-header">
      <h1>Cucina</h1>
      <p>Vista ordini in arrivo</p>
    </section>

    <section id="ordersBox" class="reservation-list"></section>
  </main>
</div>

<script type="module">
import { requireAuth, logout } from "./js/auth.service.js";
import supabase from "./js/supabase-client.js";
import { getKitchenOrders, printKitchenOrder } from "./js/kitchen-advanced.service.js";

await requireAuth();

const pendingPrints = new Map();

function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
}

function schedulePrint(order){
  if(pendingPrints.has(order.id)) return;

  const timeoutId = setTimeout(() => {
    printKitchenOrder(order);
    pendingPrints.delete(order.id);

    const badge = document.getElementById(`print-status-${order.id}`);
    if(badge){
      badge.textContent = "Stampato";
      badge.className = "badge badge-confirmed";
    }

    const cancelBtn = document.getElementById(`cancel-print-${order.id}`);
    if(cancelBtn){
      cancelBtn.remove();
    }
  }, 4000);

  pendingPrints.set(order.id, timeoutId);
}

function cancelScheduledPrint(orderId){
  const timeoutId = pendingPrints.get(orderId);
  if(timeoutId){
    clearTimeout(timeoutId);
    pendingPrints.delete(orderId);
  }

  const badge = document.getElementById(`print-status-${orderId}`);
  if(badge){
    badge.textContent = "Stampa annullata";
    badge.className = "badge badge-cancelled";
  }

  const btn = document.getElementById(`cancel-print-${orderId}`);
  if(btn){
    btn.remove();
  }
}

async function loadKitchen(){
  const orders = await getKitchenOrders();
  const box = document.getElementById("ordersBox");

  if(!orders.length){
    box.innerHTML = `<div class="empty-card">Nessun ordine in cucina</div>`;
    return;
  }

  box.innerHTML = orders.map(order => `
    <article class="reservation-card">
      <div class="reservation-top">
        <div>
          <h3 class="reservation-name">Tavolo ${order.table_code || "-"}</h3>
          <div class="reservation-meta">
            <span>🕒 ${new Date(order.created_at).toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" })}</span>
            ${order.note ? `<span>📝 ${order.note}</span>` : ""}
          </div>
        </div>
      </div>

      <div style="margin-top:18px;">
        ${(order.order_items || []).map(item => `
          <div style="padding:12px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:12px;">
            <div><strong>${item.item_name}</strong> x${item.qty}</div>
          </div>
        `).join("")}
      </div>

      <div class="reservation-actions">
        <span id="print-status-${order.id}" class="badge badge-pending">Stampa tra pochi secondi</span>
        <button id="cancel-print-${order.id}" class="btn btn-danger" onclick="cancelScheduledPrint('${order.id}')">Annulla stampa</button>
      </div>
    </article>
  `).join("");

  orders.forEach(order => schedulePrint(order));
}

async function doLogout(){
  await logout();
  location.href = "login.html";
}

window.openDrawer = openDrawer;
window.closeDrawer = closeDrawer;
window.cancelScheduledPrint = cancelScheduledPrint;
window.doLogout = doLogout;

await loadKitchen();

supabase
  .channel("kitchen-live")
  .on("postgres_changes", { event:"*", schema:"public", table:"orders" }, async () => {
    loadKitchen();
  })
  .subscribe();
</script>

</body>
</html>
