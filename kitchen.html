<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Officine Mare — Cucina</title>
  <link rel="icon" href="favicon.ico" />

  <!-- ✅ Supabase JS v2 (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bgTop:#245b7c; --bgMid:#1b4968; --bgBot:#163e5a;
      --paper: rgba(255,255,255,.95);
      --text:#0b2236; --muted: rgba(11,34,54,.68);
      --borderD: rgba(11,34,54,.10);
      --shadow: 0 22px 70px rgba(0,0,0,.20);
      --max: 1600px; --radiusXL: 26px;
      --safeTop: env(safe-area-inset-top, 0px);
      --headerReal: 74px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      overflow-x:hidden;
      background:
        radial-gradient(1100px 480px at 50% -180px, rgba(255,255,255,.16), transparent 62%),
        radial-gradient(900px 420px at 15% 10%, rgba(255,255,255,.10), transparent 60%),
        radial-gradient(900px 420px at 85% 14%, rgba(255,255,255,.08), transparent 62%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 45%, var(--bgBot) 100%);
    }

    .container{
      width: min(96vw, var(--max));
      margin: 0 auto;
      padding: 0 clamp(12px, 1.8vw, 28px);
    }

    header{
      position: fixed;
      top:0; left:0; right:0;
      z-index: 50;
      padding-top: var(--safeTop);
      background: rgba(22,62,90,.78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .header-inner{
      min-height: 74px;
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 10px 0;
      flex-wrap: wrap;
    }
    .brand{
      font-weight: 950;
      letter-spacing: .6px;
      font-size: 20px;
      white-space: nowrap;
      display:flex;
      align-items:center;
      gap:10px;
      flex: 1 1 auto;
      min-width: 220px;
    }
    .actions{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content:flex-end;
      flex: 1 1 auto;
    }
    .ghost{
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      font-size: 13px;
    }

    main{
      padding: calc(var(--headerReal) + 14px) 0 60px;
    }

    .row{ display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
    select{
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(11,34,54,.18);
      background: rgba(255,255,255,.98);
      color: var(--text);
      outline:none;
    }
    button{
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(11,34,54,.16);
      cursor:pointer;
      font-weight: 950;
    }
    .primary{
      color:#fff;
      border-color: rgba(0,0,0,.10);
      background: linear-gradient(180deg, rgba(36,91,124,.96), rgba(22,62,90,.98));
      box-shadow: 0 16px 28px rgba(0,0,0,.12);
    }
    .soft{
      background: rgba(36,91,124,.10);
      color: rgba(11,34,54,.92);
    }
    .mini{ padding: 8px 10px; font-size: 12px; }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--paper);
      color: var(--text);
      border-radius: var(--radiusXL);
      border: 1px solid var(--borderD);
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
      overflow:hidden;
    }

    .topline{
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap: wrap;
    }
    .title{ font-weight: 950; font-size: 18px; margin:0; }
    .muted{ color: var(--muted); font-size: 13px; }

    .badge{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.08);
      color: rgba(11,34,54,.92);
      white-space: nowrap;
    }
    .badge.open{ background: rgba(255,180,90,.18); }
    .badge.done{ background: rgba(40,140,80,.16); }

    .list{ margin-top: 10px; display:grid; gap: 8px; }
    .item{
      border-radius: 16px;
      border: 1px solid rgba(11,34,54,.10);
      background: rgba(255,255,255,.98);
      padding: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .itName{ font-weight: 950; font-size: 13px; }
    .qtyPill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.06);
      min-width: 44px;
    }
    .lineState{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 950;
      font-size: 12px;
      border: 1px solid rgba(11,34,54,.12);
      background: rgba(36,91,124,.06);
      color: rgba(11,34,54,.90);
    }
    .lineState.ready{
      background: rgba(40,140,80,.16);
      border-color: rgba(40,140,80,.25);
    }
  </style>
</head>

<body>
  <header id="siteHeader">
    <div class="container header-inner">
      <div class="brand">🍳 Officine Mare — Cucina</div>
      <div class="actions">
        <button class="ghost" id="soundBtn">🔔 Suono: ON</button>
        <button class="ghost" id="vibBtn">📳 Vibra: ON</button>
        <button class="ghost" id="refreshBtn">Aggiorna</button>
        <a class="ghost" href="admin.html">↩️ Admin</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="row" style="margin-bottom:12px;">
      <select id="filter">
        <option value="open">Aperte</option>
        <option value="done">Complete</option>
        <option value="all">Tutte</option>
      </select>
      <button class="soft" id="demoBtn">Demo dati</button>
      <span class="muted" id="statusMsg"></span>
    </div>

    <div class="grid" id="ordersGrid"></div>
  </main>

  <script>
    // --- header height fix (mobile)
    function setHeaderRealHeight(){
      const h = Math.ceil(document.getElementById("siteHeader").getBoundingClientRect().height);
      document.documentElement.style.setProperty("--headerReal", h + "px");
    }
    window.addEventListener("load", setHeaderRealHeight, { once:true });
    window.addEventListener("resize", setHeaderRealHeight);
    window.visualViewport?.addEventListener("resize", setHeaderRealHeight);
    window.visualViewport?.addEventListener("scroll", setHeaderRealHeight);
    setTimeout(setHeaderRealHeight, 60);
    setTimeout(setHeaderRealHeight, 250);

    // ✅ Supabase init (METTI I TUOI VALORI)
    const SUPABASE_URL = "PASTE_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "PASTE_SUPABASE_ANON_KEY";
    const sb = window.supabase?.createClient?.(SUPABASE_URL, SUPABASE_ANON_KEY);

    // UI
    const ordersGrid = document.getElementById("ordersGrid");
    const filterEl = document.getElementById("filter");
    const statusMsg = document.getElementById("statusMsg");

    const soundBtn = document.getElementById("soundBtn");
    const vibBtn = document.getElementById("vibBtn");
    let soundOn = true;
    let vibOn = true;

    function fmtTime(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" });
      }catch{ return ""; }
    }

    function beep(){
      if(!soundOn) return;
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine"; o.frequency.value = 740;
        g.gain.value = 0.06;
        o.connect(g); g.connect(ctx.destination);
        o.start();
        setTimeout(() => { o.stop(); ctx.close(); }, 160);
      }catch{}
    }
    function vibrate(){
      if(!vibOn) return;
      try{ navigator.vibrate?.([120, 80, 120]); }catch{}
    }

    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔔 Suono: ON" : "🔕 Suono: OFF";
      if(soundOn) beep();
    });
    vibBtn.addEventListener("click", () => {
      vibOn = !vibOn;
      vibBtn.textContent = vibOn ? "📳 Vibra: ON" : "📴 Vibra: OFF";
      if(vibOn) vibrate();
    });

    // --- progress: per cucina "done" = tutte READY o SERVED
    function orderProgress(o){
      const items = o.items || [];
      const total = items.length;
      const ready = items.filter(it => it.line_status === "ready" || it.line_status === "served").length;
      const done = (total > 0 && ready === total);
      return { total, ready, done };
    }

    async function fetchOrders(){
      // fallback demo se sb non configurato
      if(!sb){
        return [];
      }
      // Qui assumo tabelle: orders + order_items
      // orders: id, table_code, status, created_at
      // order_items: id, order_id, name, qty, price, line_status, created_at
      const { data, error } = await sb
        .from("orders")
        .select("id, table_code, status, created_at, order_items(id, name, qty, price, line_status, created_at)")
        .neq("status","archived")
        .order("created_at",{ ascending:false });

      if(error) throw error;

      return (data || []).map(o => ({
        id: o.id,
        table: o.table_code,
        status: o.status,
        created_at: o.created_at,
        items: (o.order_items || []).map(it => ({
          id: it.id,
          name: it.name,
          qty: it.qty,
          price: it.price,
          line_status: it.line_status || "todo"
        }))
      }));
    }

    async function setLineStatus(lineId, status){
      if(!sb) return;
      const payload = { line_status: status };
      if(status === "ready") payload.ready_at = new Date().toISOString();
      if(status === "todo") payload.ready_at = null;
      // cucina NON mette served
      const { error } = await sb.from("order_items").update(payload).eq("id", lineId);
      if(error) throw error;
    }

    async function archiveOrder(orderId){
      if(!sb) return;
      const { error } = await sb.from("orders").update({ status:"archived" }).eq("id", orderId);
      if(error) throw error;
    }

    function render(rows){
      const f = filterEl.value;
      let list = rows;

      if(f !== "all"){
        list = list.filter(o => {
          const p = orderProgress(o);
          return f === "done" ? p.done : !p.done;
        });
      }

      ordersGrid.innerHTML = "";
      if(list.length === 0){
        ordersGrid.innerHTML = `
          <div class="card">
            <h2 class="title">Nessuna comanda</h2>
            <p class="muted">Qui compariranno le comande inviate dall’admin.</p>
          </div>`;
        return;
      }

      list.forEach(o => {
        const p = orderProgress(o);
        const badge = p.done
          ? `<span class="badge done">Completa (${p.ready}/${p.total})</span>`
          : `<span class="badge open">In lavorazione (${p.ready}/${p.total})</span>`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="topline">
            <div>
              <h2 class="title">Tavolo ${o.table}</h2>
              <div class="muted">Ricevuta alle ${fmtTime(o.created_at)} · ID ${String(o.id).slice(0,8)}</div>
            </div>
            <div class="row">
              ${badge}
              ${p.done ? `<button class="soft mini" data-arch="${o.id}">Archivia</button>` : ``}
            </div>
          </div>

          <div class="list">
            ${o.items.map(it => {
              const ready = it.line_status === "ready" || it.line_status === "served";
              return `
                <div class="item">
                  <div style="min-width:0;">
                    <div class="itName">${it.name}</div>
                    <div class="muted" style="font-size:12px;">qty: <strong>${it.qty}</strong></div>
                  </div>
                  <div class="row" style="justify-content:flex-end;">
                    <span class="qtyPill">x${it.qty}</span>
                    <span class="lineState ${ready ? "ready" : ""}">${ready ? "Pronto" : "Da fare"}</span>
                    ${
                      ready
                        ? `<button class="soft mini" data-undo="${it.id}">Non pronto</button>`
                        : `<button class="primary mini" data-ready="${it.id}">Pronto</button>`
                    }
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;

        card.querySelectorAll("[data-ready]").forEach(btn=>{
          btn.addEventListener("click", async ()=>{
            try{
              await setLineStatus(btn.dataset.ready, "ready");
              await poll(true);
            }catch(e){ alert("Errore: " + (e.message||e)); }
          });
        });
        card.querySelectorAll("[data-undo]").forEach(btn=>{
          btn.addEventListener("click", async ()=>{
            try{
              await setLineStatus(btn.dataset.undo, "todo");
              await poll(true);
            }catch(e){ alert("Errore: " + (e.message||e)); }
          });
        });
        card.querySelectorAll("[data-arch]").forEach(btn=>{
          btn.addEventListener("click", async ()=>{
            try{
              // doppio check: archivia solo se tutto pronto
              const pp = orderProgress(o);
              if(!pp.done) return alert("Puoi archiviare solo quando tutte le righe sono pronte.");
              await archiveOrder(btn.dataset.arch);
              await poll(true);
            }catch(e){ alert("Errore: " + (e.message||e)); }
          });
        });

        ordersGrid.appendChild(card);
      });
    }

    let lastHash = "";
    async function poll(showToast){
      try{
        const rows = await fetchOrders();
        const activeIds = rows.map(o=>String(o.id)).sort().join("|");
        if(lastHash && activeIds !== lastHash){
          beep(); vibrate();
          if(showToast !== false){
            statusMsg.textContent = "Aggiornato ✅";
            setTimeout(()=> statusMsg.textContent="", 1200);
          }
        }
        lastHash = activeIds;
        render(rows);
      }catch(e){
        statusMsg.textContent = "Errore caricamento: " + (e.message||e);
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", ()=>poll(true));
    filterEl.addEventListener("change", ()=>poll(false));

    // demo: SOLO UI (non scrive su DB)
    document.getElementById("demoBtn").addEventListener("click", ()=>{
      const demo = [{
        id:"demo1", table:"T07", status:"open", created_at:new Date().toISOString(),
        items:[
          { id:"l1", name:"Crudo di mare (mix)", qty:1, line_status:"todo" },
          { id:"l2", name:"Spaghetti alle vongole", qty:2, line_status:"ready" },
          { id:"l3", name:"Frittura di calamari", qty:1, line_status:"todo" },
        ]
      }];
      render(demo);
      statusMsg.textContent="Demo attiva (solo UI).";
      setTimeout(()=> statusMsg.textContent="", 1200);
    });

    poll(false);
    setInterval(()=>poll(false), 2500);
  </script>
</body>
</html>
