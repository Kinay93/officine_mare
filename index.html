<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prenota il tuo tavolo - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    .booking-page{
      min-height:100vh;
      background:linear-gradient(180deg,#0B1F3A 0%, #173A63 48%, #F7F2EA 48%, #F7F2EA 100%);
    }

    .hero{
      min-height:520px;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:24px 20px 0;
      overflow:hidden;
      background:linear-gradient(180deg,#0B1F3A 0%, #173A63 100%);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:url("assets/hero.jpg") center/cover no-repeat;
      opacity:.35;
    }

    .hero::after{
      content:"";
      position:absolute;
      left:0; right:0; bottom:-1px;
      height:180px;
      background:linear-gradient(to bottom, rgba(247,242,234,0) 0%, rgba(247,242,234,.88) 65%, #F7F2EA 100%);
    }

    .hero-inner{
      position:relative;
      z-index:2;
      text-align:center;
      color:#fff;
      max-width:920px;
      padding-top:6px;
    }

    .hero-logo{
      width:92px;
      height:92px;
      border-radius:22px;
      object-fit:cover;
      border:4px solid rgba(255,255,255,.78);
      box-shadow:0 12px 30px rgba(0,0,0,.20);
      margin-bottom:18px;
      background:#fff;
    }

    .hero-title{
      margin:0;
      font-size:70px;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-1px;
    }

    .hero-subtitle{
      margin:16px 0 0;
      font-size:19px;
      opacity:.96;
    }

    .booking-card{
      width:min(920px, 92vw);
      margin:-88px auto 34px;
      background:rgba(255,255,255,.98);
      border:1px solid var(--border);
      border-radius:28px;
      box-shadow:0 18px 50px rgba(16,40,74,.12);
      padding:34px;
      position:relative;
      z-index:5;
    }

    .booking-card h2{ margin:0 0 6px; font-size:22px; }
    .booking-card p{ margin:0 0 22px; color:var(--muted); }

    .booking-grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-bottom:16px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-weight:700;
      color:var(--text);
    }

    .booking-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    .booking-status{
      margin-top:16px;
      font-size:14px;
    }

    .booking-status.ok{ color:#0F8A5A; font-weight:700; }
    .booking-status.bad{ color:#C53B3B; font-weight:700; }

    .day-menu-toggle{
      margin-top:18px;
    }

    .day-menu-panel{
      margin-top:14px;
      display:none;
      background:var(--surface-soft);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
    }

    .day-menu-panel.open{
      display:block;
    }

    .day-menu-panel img{
      width:100%;
      border-radius:14px;
      display:block;
    }

    .site-footer{
      margin-top:20px;
      padding:26px 20px 34px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .site-footer a{
      color:var(--navy-soft);
      font-weight:700;
    }

    @media (max-width:900px){
      .hero-title{ font-size:44px; }
      .booking-grid-2{ grid-template-columns:1fr; }
      .booking-card{ padding:24px; }
    }
  </style>
</head>
<body class="booking-page">

  <section class="hero">
    <div class="hero-inner">
      <img src="assets/logo.png" alt="Logo Officine Mare" class="hero-logo">
      <h1 class="hero-title">Prenota il tuo tavolo</h1>
      <p class="hero-subtitle">Un’esperienza culinaria unica ti aspetta</p>
    </div>
  </section>

  <section class="booking-card">
    <h2>Prenotazione</h2>
    <p>Compila il form e invia la tua richiesta al ristorante.</p>

    <form id="bookingForm">
      <div class="booking-grid-2">
        <div class="field">
          <label>Nome *</label>
          <input id="name" required placeholder="Mario Rossi">
        </div>
        <div class="field">
          <label>Telefono *</label>
          <input id="phone" required placeholder="+39 333 1234567">
        </div>
      </div>

      <div class="booking-grid-2">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="mario@email.com">
        </div>
        <div class="field">
          <label>Persone *</label>
          <select id="people" required>
            <option value="">N°</option>
            <option>1</option><option>2</option><option>3</option><option>4</option>
            <option>5</option><option>6</option><option>7</option><option>8</option>
            <option>9</option><option>10</option><option>11</option><option>12</option>
          </select>
        </div>
      </div>

      <div class="booking-grid-2">
        <div class="field">
          <label>Data *</label>
          <input id="date" type="date" required>
        </div>
        <div class="field">
          <label>Ora *</label>
          <input id="time" type="time" required>
        </div>
      </div>

      <div class="field">
        <label>Note</label>
        <textarea id="notes" rows="4" placeholder="Allergie, richieste, preferenze..."></textarea>
      </div>

      <div class="booking-actions">
        <button type="submit" class="btn btn-primary">Prenota ora</button>
        <button type="reset" class="btn btn-soft">Pulisci</button>
      </div>

      <div class="day-menu-toggle">
        <button type="button" class="btn btn-soft" onclick="toggleDayMenu()">Menù del giorno</button>
      </div>

      <div id="dayMenuPanel" class="day-menu-panel">
        <div id="dayMenuContent" style="color:var(--muted);">Nessun menù del giorno disponibile.</div>
      </div>

      <div id="bookingStatus" class="booking-status"></div>
    </form>
  </section>

  <footer class="site-footer">
    <div><strong>Officine Mare</strong></div>
    <div style="margin-top:8px;">Via da inserire · Telefono da inserire · Email da inserire</div>
    <div style="margin-top:8px;">
      Instagram:
      <a href="https://instagram.com/" target="_blank">seguici qui</a>
    </div>
  </footer>

<script type="module">
import supabase from "./js/supabase-client.js";
import { getMenuDay } from "./js/menu.service.js";

const form = document.getElementById("bookingForm");
const statusBox = document.getElementById("bookingStatus");

window.toggleDayMenu = async function(){
  const panel = document.getElementById("dayMenuPanel");
  const content = document.getElementById("dayMenuContent");
  panel.classList.toggle("open");

  if(panel.classList.contains("open")){
    const data = await getMenuDay();
    if(data?.image_url){
      content.innerHTML = `<img src="${data.image_url}" alt="Menù del giorno">`;
    }else if(data?.text){
      content.textContent = data.text;
    }else{
      content.textContent = "Nessun menù del giorno disponibile.";
    }
  }
};

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    customer_name: document.getElementById("name").value.trim(),
    customer_phone: document.getElementById("phone").value.trim(),
    reservation_date: document.getElementById("date").value,
    reservation_time: document.getElementById("time").value,
    people: Number(document.getElementById("people").value || 0),
    notes: [
      document.getElementById("notes").value.trim(),
      document.getElementById("email").value.trim()
        ? "Email: " + document.getElementById("email").value.trim()
        : ""
    ].filter(Boolean).join(" | "),
    status: "pending"
  };

  try{
    statusBox.className = "booking-status";
    statusBox.textContent = "Invio in corso...";

    const { error } = await supabase.from("reservations").insert([payload]);
    if(error) throw error;

    form.reset();
    statusBox.className = "booking-status ok";
    statusBox.textContent = "Prenotazione inviata con successo.";
  }catch(err){
    statusBox.className = "booking-status bad";
    statusBox.textContent = "Errore invio: " + (err?.message || err);
  }
});
</script>

</body>
</html>
