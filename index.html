<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Officine di Mare</title>

<link rel="stylesheet" href="css/theme.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div style="text-align:center;padding:40px">

<img src="assets/logo.jpg" height="80"
onerror="this.src='assets/logo.png'">

<h1>Prenota il tuo tavolo</h1>

</div>


<div class="card" style="max-width:500px;margin:auto">

<label>Nome</label>
<input id="name">

<label>Telefono</label>
<input id="phone">

<label>Email</label>
<input id="email">

<label>Data</label>
<input id="date" type="date">

<label>Ora</label>
<input id="time" type="time">

<label>Persone</label>
<input id="people" type="number">

<button onclick="book()">Prenota</button>

</div>


<script type="module">

import supabase from "./js/supabase-client.js";

async function book(){

let {error} = await supabase
.from("reservations")
.insert({

customer_name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
reservation_date:document.getElementById("date").value,
reservation_time:document.getElementById("time").value,
guests:document.getElementById("people").value

})

if(error){

alert("Errore prenotazione")

}else{

alert("Prenotazione inviata!")

}

}

window.book = book

</script>

</body>
</html>
