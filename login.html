<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Staff - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#0B1F3A 0%, #133156 100%);
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:420px;
      background:white;
      border-radius:18px;
      padding:32px;
      box-shadow:0 20px 50px rgba(0,0,0,0.25);
    }

    .login-box h1{
      margin:0 0 8px 0;
      text-align:center;
      color:#0B1F3A;
    }

    .login-box p{
      text-align:center;
      color:#6B7280;
      margin-bottom:24px;
    }

    .login-box input{
      width:100%;
      padding:12px;
      border:1px solid #D1D5DB;
      border-radius:10px;
      margin-bottom:14px;
      box-sizing:border-box;
    }

    .login-logo{
      display:block;
      margin:0 auto 16px auto;
      height:82px;
      width:auto;
      object-fit:contain;
    }

    .login-error{
      margin-top:14px;
      color:#B91C1C;
      font-size:14px;
      text-align:center;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

  <div class="login-box">
    <img src="assets/logo.jpg" class="login-logo" onerror="this.src='assets/logo.png'">

    <h1>Accesso Staff</h1>
    <p>Area riservata ristoratore</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button style="width:100%;" onclick="doLogin()">Entra</button>

    <div id="loginError" class="login-error"></div>
  </div>

<script type="module">
import { login } from "./js/auth.service.js";

async function doLogin(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("loginError");

  errorBox.textContent = "";

  try{
    await login(email, password);
    window.location.href = "admin.html";
  }catch(err){
    errorBox.textContent = "Login non riuscito: " + (err?.message || err);
  }
}

window.doLogin = doLogin;
</script>

</body>
</html>
