<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ordini - Officine Mare</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase-config.js"></script>
  <style>
    .order-modal{position:fixed;inset:0;background:rgba(10,29,56,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:24px}
    .order-modal.open{display:flex}
    .order-modal-box{width:min(980px,96vw);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;border:1px solid var(--border);box-shadow:0 18px 50px rgba(16,40,74,.12);padding:26px}
    .menu-group{margin-top:16px}
    .menu-item-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:16px;background:#fff;margin-top:10px}
    .qty-controls{display:flex;align-items:center;gap:10px}
    .qty-controls button{width:34px;height:34px;border-radius:12px}
  </style>
</head>
<body>
<div class="admin-shell">
  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" id="openDrawerBtn">☰</button>
      <div class="brand"><img src="assets/logo.png" alt="Logo"><span>Ristorante</span></div>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div>
      <div class="drawer-head">
        <div class="drawer-title"><h2>Officine Mare</h2><p>Pannello di gestione</p></div>
        <button class="drawer-close" id="closeDrawerBtn">✕</button>
      </div>
      <nav class="drawer-nav">
        <a class="drawer-link" href="admin.html">📅 Prenotazioni</a>
        <a class="drawer-link" href="tables.html">◻️ Tavoli</a>
        <a class="drawer-link" href="menu.html">📖 Menu</a>
        <a class="drawer-link active" href="orders.html">🍽️ Ordini</a>
        <a class="drawer-link" href="kitchen.html">👨‍🍳 Cucina</a>
        <a class="drawer-link" href="calendar.html">🗓️ Gestisci calendario</a>
      </nav>
    </div>
    <div><button class="btn btn-soft" style="width:100%;" id="logoutBtn">Esci</button></div>
  </aside>

  <main class="admin-content">
    <section class="page-header">
      <h1>Ordini</h1>
      <p>Prendi ordini e inviali in cucina</p>
    </section>

    <section style="display:flex;justify-content:flex-end;margin-bottom:18px;">
      <button class="btn btn-primary" id="openOrderModalBtn">＋ Nuovo ordine</button>
    </section>

    <section id="ordersList" class="reservation-list"></section>
  </main>
</div>

<div class="order-modal" id="orderModal">
  <div class="order-modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;">
      <div>
        <h2 style="margin:0;font-size:22px;">Nuovo ordine</h2>
        <p style="margin:8px 0 0;color:var(--muted);">Seleziona tavolo e piatti del menu</p>
      </div>
      <button class="btn btn-soft" id="closeOrderModalBtn">✕</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <select id="orderTableSelect"></select>
      <input id="orderNote" placeholder="Nota comanda (opzionale)">
    </div>

    <div id="orderMenuWrap"></div>

    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:20px;">
      <button class="btn btn-soft" id="cancelOrderModalBtn">Chiudi</button>
      <button class="btn btn-primary" id="saveOrderBtn">Invia in cucina</button>
    </div>
  </div>
</div>

<script type="module" src="js/orders-page.js"></script>
</body>
</html>
