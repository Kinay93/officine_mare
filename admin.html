<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="css/theme.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div style="display:flex">

<div style="width:220px;background:#0B1F3A;color:white;height:100vh;padding:20px">

<h2>Officine Mare</h2>

<p>Dashboard</p>
<p>Prenotazioni</p>
<p>Menu</p>
<p>Tavoli</p>
<p>Ordini</p>

</div>


<div style="flex:1;padding:40px">

<h1>Prenotazioni</h1>

<div id="reservations"></div>

</div>

</div>


<script type="module">

import supabase from "./js/supabase-client.js"

async function loadReservations(){

let {data} = await supabase
.from("reservations")
.select("*")

let html=""

data.forEach(r=>{

html+=`

<div class="card">

<b>${r.customer_name}</b><br>
${r.reservation_date} ${r.reservation_time}<br>
${r.guests} persone

</div>

`

})

document.getElementById("reservations").innerHTML=html

}

loadReservations()

</script>

</body>
</html>
