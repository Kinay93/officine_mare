<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Admin - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div style="display:flex;min-height:100vh;">

  <aside style="width:260px;background:#0B1F3A;color:white;padding:24px;display:flex;flex-direction:column;justify-content:space-between;">
    <div>
      <div style="text-align:center;margin-bottom:24px;">
        <img src="assets/logo.jpg" height="80" onerror="this.src='assets/logo.png'">
        <h2 style="margin-top:12px;">Officine Mare</h2>
        <div style="opacity:0.7;">Pannello di gestione</div>
      </div>

      <a class="sidebar-link active" href="admin.html">Prenotazioni</a>
      <a class="sidebar-link" href="menu.html">Menu</a>
      <a class="sidebar-link" href="tables.html">Tavoli</a>
      <a class="sidebar-link" href="orders.html">Ordini</a>
      <a class="sidebar-link" href="kitchen.html">Cucina</a>
    </div>

    <div style="margin-top:30px;">
      <button style="width:100%;" onclick="doLogout()">Logout</button>
    </div>
  </aside>

  <main style="flex:1;padding:30px;">
    <div class="page-title">
      <div>
        <h1>Prenotazioni</h1>
        <p style="color:#6B7280;margin-top:8px;">Conferma, assegna tavoli e invia conferma al cliente</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <small>In attesa</small>
        <strong id="pendingCount">0</strong>
      </div>
      <div class="stat-box">
        <small>Confermate</small>
        <strong id="confirmedCount">0</strong>
      </div>
      <div class="stat-box">
        <small>Conferme inviate</small>
        <strong id="sentCount">0</strong>
      </div>
    </div>

    <div class="top-filters">
      <input id="searchInput" placeholder="Cerca per nome o telefono">
      <select id="statusFilter">
        <option value="all">Tutti gli stati</option>
        <option value="pending">In attesa</option>
        <option value="confirmed">Confermate</option>
        <option value="cancelled">Annullate</option>
      </select>
      <button onclick="loadReservations()">Aggiorna</button>
    </div>

    <div id="reservationsList"></div>
  </main>

</div>

<script type="module">
import { requireAuth, logout } from "./js/auth.service.js";
import {
  updateReservationStatus,
  searchReservations
} from "./js/reservations.service.js";
import { getTables } from "./js/ui.js";
import {
  getReservationTables,
  setReservationTables
} from "./js/reservation-tables.service.js";
import {
  sendReservationConfirmation,
  markConfirmationSent
} from "./js/notifications.service.js";

await requireAuth();

async function loadReservations() {
  const search = document.getElementById("searchInput").value;
  const status = document.getElementById("statusFilter").value;

  const data = await searchReservations(search, status);
  const tables = await getTables();

  document.getElementById("pendingCount").textContent =
    data.filter(x => x.status === "pending").length;

  document.getElementById("confirmedCount").textContent =
    data.filter(x => x.status === "confirmed").length;

  document.getElementById("sentCount").textContent =
    data.filter(x => x.confirmation_sent === true).length;

  let html = "";

  for (const r of data) {
    const badgeClass =
      r.status === "confirmed"
        ? "confirmed"
        : r.status === "cancelled"
        ? "cancelled"
        : "pending";

    const assignedTables = await getReservationTables(r.id);
    const assignedCodes = assignedTables.map(x => x.table_code);

    html += `
      <div class="list-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;">
          <div>
            <h3 style="margin:0 0 8px 0;">${r.customer_name}</h3>
            <span class="badge ${badgeClass}">${r.status}</span>
            ${
              r.confirmation_sent
                ? `<span class="badge confirmed" style="margin-left:8px;">conferma inviata</span>`
                : ``
            }

            <div style="margin-top:14px;color:#6B7280;">
              <div>📅 ${r.reservation_date}</div>
              <div>🕒 ${String(r.reservation_time).slice(0,5)}</div>
              <div>👥 ${r.people} persone</div>
              <div>📞 ${r.customer_phone || "-"}</div>
              <div>📝 ${r.notes || "-"}</div>
            </div>
          </div>
        </div>

        <div style="margin-top:18px;">
          <strong>Assegna tavoli</strong>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;">
            ${tables.map(t => `
              <label style="display:flex;gap:8px;align-items:center;border:1px solid #ddd;padding:10px;border-radius:10px;">
                <input type="checkbox"
                  class="table-check-${r.id}"
                  value="${t.code}"
                  ${assignedCodes.includes(t.code) ? "checked" : ""}
                  ${!t.is_open ? "disabled" : ""}
                >
                <span>${t.code}</span>
              </label>
            `).join("")}
          </div>
        </div>

        <div class="row-actions">
          <button onclick="saveReservationTables('${r.id}')">Salva tavoli</button>
          <button onclick="confirmReservation('${r.id}')">Conferma</button>
          <button class="secondary" onclick="cancelReservation('${r.id}')">Annulla</button>
          <button onclick="sendConfirmation('${r.id}', '${r.customer_name}', '${r.customer_phone || ""}', '${r.reservation_date}', '${String(r.reservation_time).slice(0,5)}')">
            Invia conferma
          </button>
        </div>
      </div>
    `;
  }

  document.getElementById("reservationsList").innerHTML =
    html || "<div class='list-card'>Nessuna prenotazione trovata</div>";
}

async function saveReservationTables(id) {
  const checks = document.querySelectorAll(`.table-check-${id}:checked`);
  const codes = Array.from(checks).map(x => x.value);
  await setReservationTables(id, codes);
  alert("Tavoli assegnati");
  loadReservations();
}

async function confirmReservation(id) {
  await updateReservationStatus(id, "confirmed");
  loadReservations();
}

async function cancelReservation(id) {
  await updateReservationStatus(id, "cancelled");
  loadReservations();
}

async function sendConfirmation(id, customerName, customerPhone, reservationDate, reservationTime) {
  try {
    await sendReservationConfirmation({
      reservationId: id,
      customerName,
      customerPhone,
      reservationDate,
      reservationTime,
      channel: "email_or_message"
    });

    await markConfirmationSent(id);

    alert("Conferma inviata");
    loadReservations();
  } catch (err) {
    alert("Errore invio conferma: " + (err?.message || err));
  }
}

async function doLogout(){
  await logout();
  window.location.href = "login.html";
}

window.loadReservations = loadReservations;
window.confirmReservation = confirmReservation;
window.cancelReservation = cancelReservation;
window.saveReservationTables = saveReservationTables;
window.sendConfirmation = sendConfirmation;
window.doLogout = doLogout;

document.getElementById("searchInput").addEventListener("input", loadReservations);
document.getElementById("statusFilter").addEventListener("change", loadReservations);

loadReservations();
</script>

</body>
</html>
