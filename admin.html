<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prenotazioni - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="admin-shell">

  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="openDrawer()">☰</button>
      <div class="brand">
        <img src="assets/logo.png">
        <span>Ristorante</span>
      </div>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <aside class="drawer" id="drawer">
    <div>
      <div class="drawer-head">
        <div class="drawer-title">
          <h2>Officine Mare</h2>
          <p>Pannello di gestione</p>
        </div>
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
      </div>

      <nav class="drawer-nav">
        <a class="drawer-link active" href="admin.html">📅 Prenotazioni</a>
        <a class="drawer-link" href="tables.html">◻️ Tavoli</a>
        <a class="drawer-link" href="menu.html">📖 Menu</a>
        <a class="drawer-link" href="orders.html">🍽️ Ordini</a>
        <a class="drawer-link" href="kitchen.html">👨‍🍳 Cucina</a>
      </nav>
    </div>

    <div>
      <button class="btn btn-soft" style="width:100%;" onclick="doLogout()">Esci</button>
    </div>
  </aside>

  <main class="admin-content">

    <section class="page-header">
      <h1>Prenotazioni</h1>
      <p>Gestisci le prenotazioni del ristorante</p>
    </section>

    <section class="stats-grid">
      <div class="stat-card warning">
        <div class="label">In attesa</div>
        <div class="value" id="pendingCount">0</div>
      </div>
      <div class="stat-card success">
        <div class="label">Confermate</div>
        <div class="value" id="confirmedCount">0</div>
      </div>
      <div class="stat-card info">
        <div class="label">Oggi</div>
        <div class="value" id="todayCount">0</div>
      </div>
    </section>

    <section class="filters-bar">
      <div class="search-box">
        <input id="searchInput" placeholder="Cerca per nome o telefono...">
      </div>
      <div class="filter-box">
        <select id="statusFilter">
          <option value="all">Tutti gli stati</option>
          <option value="pending">In attesa</option>
          <option value="confirmed">Confermate</option>
          <option value="cancelled">Annullate</option>
          <option value="arrived">Arrivate</option>
        </select>
      </div>
    </section>

    <section id="reservationsList" class="reservation-list"></section>

  </main>
</div>

<script type="module">
import { requireAuth, logout } from "./js/auth.service.js";
import { searchReservations, updateReservationStatus } from "./js/reservations.service.js";
import { getTables } from "./js/ui.js";
import { getReservationTables, setReservationTables } from "./js/reservation-tables.service.js";

await requireAuth();

function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
}

function isToday(dateStr){
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,"0");
  const d = String(today.getDate()).padStart(2,"0");
  return dateStr === `${y}-${m}-${d}`;
}

async function loadReservations(){
  const search = document.getElementById("searchInput").value;
  const status = document.getElementById("statusFilter").value;

  const data = await searchReservations(search, status);
  const tables = await getTables();

  document.getElementById("pendingCount").textContent =
    data.filter(x => x.status === "pending").length;

  document.getElementById("confirmedCount").textContent =
    data.filter(x => x.status === "confirmed").length;

  document.getElementById("todayCount").textContent =
    data.filter(x => isToday(x.reservation_date)).length;

  const list = document.getElementById("reservationsList");

  if(!data.length){
    list.innerHTML = `<div class="empty-card">Nessuna prenotazione trovata</div>`;
    return;
  }

  let html = "";

  for(const r of data){
    const assigned = await getReservationTables(r.id);
    const assignedCodes = assigned.map(x => x.table_code);

    let badgeClass = "badge-pending";
    if(r.status === "confirmed") badgeClass = "badge-confirmed";
    if(r.status === "cancelled") badgeClass = "badge-cancelled";

    html += `
      <article class="reservation-card">
        <div class="reservation-top">
          <div>
            <h3 class="reservation-name">${r.customer_name}</h3>
            <div style="margin-top:10px;">
              <span class="badge ${badgeClass}">
                ${r.status === "pending" ? "In attesa" :
                  r.status === "confirmed" ? "Confermata" :
                  r.status === "cancelled" ? "Annullata" :
                  r.status}
              </span>
            </div>

            <div class="reservation-meta">
              <span>📅 ${r.reservation_date}</span>
              <span>🕒 ${String(r.reservation_time || "").slice(0,5)}</span>
              <span>👥 ${r.people} persone</span>
              <span>📞 ${r.customer_phone || "-"}</span>
              ${r.notes ? `<span>✉️ ${r.notes}</span>` : ""}
            </div>
          </div>
        </div>

        <div style="margin-top:22px;">
          <strong>Assegna tavoli</strong>
          <div class="table-check-grid">
            ${tables.map(t => `
              <label class="table-check-item">
                <input
                  type="checkbox"
                  class="table-check-${r.id}"
                  value="${t.code}"
                  ${assignedCodes.includes(t.code) ? "checked" : ""}
                  ${!t.is_open ? "disabled" : ""}
                >
                <span>${t.code}</span>
              </label>
            `).join("")}
          </div>
        </div>

        <div class="reservation-actions">
          <button class="btn btn-soft" onclick="saveReservationTables('${r.id}')">Salva tavoli</button>
          <button class="btn btn-success" onclick="confirmReservation('${r.id}')">✓ Conferma</button>
          <button class="btn btn-danger" onclick="cancelReservation('${r.id}')">✕ Rifiuta</button>
        </div>
      </article>
    `;
  }

  list.innerHTML = html;
}

async function saveReservationTables(id){
  const checks = document.querySelectorAll(`.table-check-${id}:checked`);
  const codes = Array.from(checks).map(x => x.value);
  await setReservationTables(id, codes);
  loadReservations();
}

async function confirmReservation(id){
  await updateReservationStatus(id, "confirmed");
  loadReservations();
}

async function cancelReservation(id){
  await updateReservationStatus(id, "cancelled");
  loadReservations();
}

async function doLogout(){
  await logout();
  location.href = "login.html";
}

window.openDrawer = openDrawer;
window.closeDrawer = closeDrawer;
window.saveReservationTables = saveReservationTables;
window.confirmReservation = confirmReservation;
window.cancelReservation = cancelReservation;
window.doLogout = doLogout;

document.getElementById("searchInput").addEventListener("input", loadReservations);
document.getElementById("statusFilter").addEventListener("change", loadReservations);

loadReservations();
</script>

</body>
</html>
