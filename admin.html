<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prenotazioni - Officine Mare</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<div class="admin-shell">

  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" id="openDrawerBtn">☰</button>
      <div class="brand">
        <img src="assets/logo.png" alt="Logo">
        <span>Ristorante</span>
      </div>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <aside class="drawer" id="drawer">
    <div>
      <div class="drawer-head">
        <div class="drawer-title">
          <h2>Officine Mare</h2>
          <p>Pannello di gestione</p>
        </div>
        <button class="drawer-close" id="closeDrawerBtn">✕</button>
      </div>

      <nav class="drawer-nav">
        <a class="drawer-link active" href="admin.html">📅 Prenotazioni</a>
        <a class="drawer-link" href="tables.html">◻️ Tavoli</a>
        <a class="drawer-link" href="menu.html">📖 Menu</a>
        <a class="drawer-link" href="orders.html">🍽️ Ordini</a>
        <a class="drawer-link" href="kitchen.html">👨‍🍳 Cucina</a>
      </nav>
    </div>

    <div>
      <button class="btn btn-soft" style="width:100%;" id="logoutBtn">Esci</button>
    </div>
  </aside>

  <main class="admin-content">

    <section class="page-header">
      <h1>Prenotazioni</h1>
      <p>Gestisci le prenotazioni del ristorante</p>
    </section>

    <section class="stats-grid">
      <div class="stat-card warning" id="cardPending" style="cursor:pointer;">
        <div class="label">In attesa</div>
        <div class="value" id="pendingCount">0</div>
      </div>

      <div class="stat-card success" id="cardConfirmed" style="cursor:pointer;">
        <div class="label">Confermate</div>
        <div class="value" id="confirmedCount">0</div>
      </div>

      <div class="stat-card info" id="cardPeriod" style="cursor:pointer;">
        <div class="label" id="periodLabel">Tutte</div>
        <div class="value" id="periodCount">0</div>
      </div>
    </section>

    <section class="filters-bar">
      <div class="search-box">
        <input id="searchInput" placeholder="Cerca per nome o telefono...">
      </div>

      <div class="filter-box">
        <select id="statusFilter">
          <option value="all">Tutti gli stati</option>
          <option value="pending">In attesa</option>
          <option value="confirmed">Confermate</option>
          <option value="cancelled">Rifiutate</option>
        </select>
      </div>
    </section>

    <section id="reservationsList" class="reservation-list"></section>

  </main>
</div>

<div class="order-modal" id="tablesModal">
  <div class="order-modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;">
      <div>
        <h2 style="margin:0;font-size:22px;">Assegna tavoli</h2>
        <p style="margin:8px 0 0;color:var(--muted);">Seleziona i tavoli per la prenotazione</p>
      </div>
      <button class="btn btn-soft" id="closeTablesModalBtn">✕</button>
    </div>

    <div id="tablesModalGrid" class="table-check-grid"></div>

    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:20px;">
      <button class="btn btn-soft" id="cancelTablesModalBtn">Chiudi</button>
      <button class="btn btn-primary" id="saveTablesBtn">Salva tavoli</button>
    </div>
  </div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
